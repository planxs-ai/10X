<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주식 투자 × AI 활용 — 10주 강의</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
  :root{
    --bg:#FEFCF8; --bg2:#FFF9F0; --bg3:#FFF5E8; --card:#FFFFFF;
    --gold:#D4A853; --amber:#E8943A; --coral:#E87461; --sage:#7BA68C; --sky:#5B9BD5; --lav:#9B8EC4;
    --ink:#1A1612; --ink2:#6B5E52; --ink3:#9E8E7E;
    --line:#EFE6D8;
    --pen-black:#1A1612; --pen-red:#E5342B; --pen-blue:#1E66E0; --pen-mark:#FFE94D;
    --radius:18px;
    --shadow:0 4px 20px rgba(26,22,18,.06);
    --shadow-h:0 12px 40px rgba(26,22,18,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;
    background:linear-gradient(160deg,#FFF5E8 0%,#FEFCF8 45%,#FFF9F0 100%);
    color:var(--ink); min-height:100vh; line-height:1.55;
  }
  .serif{font-family:'Noto Serif KR',serif;}

  /* ===== Header ===== */
  header{
    position:sticky; top:0; z-index:40;
    background:rgba(255,249,240,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
    padding:14px clamp(16px,3vw,40px);
  }
  .head-row{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:space-between;}
  .brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
  .brand h1{
    font-family:'Noto Serif KR',serif;font-weight:900;
    font-size:clamp(1.3rem,2.1vw,2rem);margin:0;letter-spacing:-.01em;
    background:linear-gradient(135deg,var(--gold),var(--amber));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand .sub{color:var(--ink2);font-size:clamp(.85rem,1.2vw,1.05rem);font-weight:600;}
  .head-actions{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-family:inherit;font-weight:700;font-size:clamp(.95rem,1.3vw,1.15rem);
    padding:10px 18px;border-radius:12px;cursor:pointer;transition:.18s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .btn.active{background:linear-gradient(135deg,var(--gold),var(--amber));color:#fff;border-color:transparent;}

  /* ===== Week nav ===== */
  .weeknav{
    max-width:1400px;margin:14px auto 0;display:flex;gap:7px;
    flex-wrap:nowrap;overflow-x:auto;justify-content:center;padding-bottom:4px;
    scrollbar-width:thin;
  }
  .weeknav::-webkit-scrollbar{height:4px;}
  .weeknav::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .wk{
    flex:none;
    border:1px solid var(--line);background:var(--card);color:var(--ink2);
    font-family:inherit;font-weight:800;font-size:clamp(.9rem,1.2vw,1.1rem);
    padding:8px 16px;border-radius:11px;cursor:pointer;transition:.16s;white-space:nowrap;
  }
  .wk b{color:var(--gold);}
  .wk:hover{border-color:var(--gold);color:var(--ink);}
  .wk.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .wk.active b{color:var(--gold);}
  .wk.allbtn{background:linear-gradient(135deg,var(--sage),#5f8c72);color:#fff;border-color:transparent;}

  /* ===== Main ===== */
  main{max-width:1400px;margin:0 auto;padding:clamp(20px,3vw,44px) clamp(16px,3vw,40px) 160px;}
  .week-block{margin-bottom:54px;}
  .week-head{margin-bottom:22px;border-left:6px solid var(--gold);padding-left:18px;}
  .week-tag{
    display:inline-block;background:var(--bg3);color:var(--amber);
    font-weight:800;font-size:clamp(.9rem,1.2vw,1.1rem);padding:4px 14px;border-radius:999px;margin-bottom:8px;
  }
  .week-title{
    font-family:'Noto Serif KR',serif;font-weight:900;margin:2px 0 4px;
    font-size:clamp(1.7rem,3.4vw,3rem);letter-spacing:-.01em;line-height:1.2;
  }
  .week-sub{color:var(--ink2);font-size:clamp(1rem,1.6vw,1.4rem);font-weight:600;}

  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,420px),1fr));gap:16px;}

  .card{
    background:var(--card);border:1px solid var(--line);border-left:5px solid var(--gold);
    border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:.18s;
  }
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);}
  .card[data-c="amber"]{border-left-color:var(--amber);}
  .card[data-c="coral"]{border-left-color:var(--coral);}
  .card[data-c="sage"]{border-left-color:var(--sage);}
  .card[data-c="sky"]{border-left-color:var(--sky);}
  .card[data-c="lav"]{border-left-color:var(--lav);}

  .card-head{display:flex;align-items:flex-start;gap:14px;padding:22px 22px;cursor:pointer;user-select:none;}
  .chip{
    flex:none;font-weight:800;font-size:clamp(.78rem,1vw,.95rem);
    padding:5px 12px;border-radius:999px;background:var(--bg3);color:var(--amber);white-space:nowrap;margin-top:4px;
  }
  .card[data-c="amber"] .chip{background:#FDEBD8;color:var(--amber);}
  .card[data-c="coral"] .chip{background:#FBE3DE;color:var(--coral);}
  .card[data-c="sage"] .chip{background:#E4EFE8;color:#5f8c72;}
  .card[data-c="sky"] .chip{background:#E1EEF9;color:var(--sky);}
  .card[data-c="lav"] .chip{background:#ECE8F5;color:var(--lav);}
  .titlewrap{flex:1;min-width:0;}
  .card-title{
    font-weight:800;letter-spacing:-.01em;line-height:1.3;
    font-size:clamp(1.25rem,2vw,1.7rem);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .card-sub{
    margin-top:3px;color:var(--ink3);font-weight:600;line-height:1.3;
    font-size:clamp(.92rem,1.2vw,1.08rem);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .arrow{flex:none;color:var(--ink3);font-size:1.4rem;transition:.25s;margin-top:2px;}
  .card.open .arrow{transform:rotate(180deg);color:var(--gold);}

  .card-body{max-height:0;overflow:hidden;transition:max-height .35s ease;}
  .card.open .card-body{max-height:1400px;}
  .card-inner{
    padding:0 22px 24px 22px;border-top:1px dashed var(--line);margin-top:-2px;
    font-size:clamp(1.05rem,1.5vw,1.35rem);color:var(--ink2);line-height:1.7;
  }
  .card-inner ul{margin:14px 0 0;padding-left:4px;list-style:none;}
  .card-inner li{position:relative;padding-left:26px;margin-bottom:10px;}
  .card-inner li::before{content:"▸";position:absolute;left:0;color:var(--gold);font-weight:900;}
  .card-inner .lead{margin-top:16px;font-weight:700;color:var(--ink);}
  .card-inner b{color:var(--ink);font-weight:800;}
  .card-inner .ai{
    margin-top:16px;background:var(--bg3);border-radius:12px;padding:12px 16px;
    font-size:.95em;color:#a5681a;font-weight:600;
  }
  .card-inner .ai::before{content:"🤖 AI 활용  ";font-weight:800;}

  /* ===== Pen palette ===== */
  #palette{
    position:fixed;left:24px;bottom:24px;z-index:60;
    background:rgba(255,255,255,.97);border:1px solid var(--line);
    border-radius:16px;box-shadow:var(--shadow-h);
    display:flex;align-items:center;gap:6px;padding:8px;touch-action:none;
  }
  .grip{
    cursor:grab;color:var(--ink3);font-size:1.4rem;padding:0 6px;user-select:none;line-height:1;
    letter-spacing:-2px;
  }
  .grip:active{cursor:grabbing;}
  .tool{
    width:46px;height:46px;border-radius:12px;border:2px solid var(--line);background:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;transition:.14s;position:relative;
  }
  .tool:hover{transform:translateY(-2px);}
  .tool.active{border-color:var(--ink);box-shadow:0 0 0 3px rgba(212,168,83,.35);}
  .swatch{width:24px;height:24px;border-radius:50%;}
  .sw-black{background:var(--pen-black);}
  .sw-red{background:var(--pen-red);}
  .sw-blue{background:var(--pen-blue);}
  .sw-mark{background:var(--pen-mark);border:1px solid #e3cf3f;}
  .divider{width:1px;height:34px;background:var(--line);margin:0 2px;}
  .tool.danger{color:var(--coral);}

  #drawCanvas{position:fixed;inset:0;z-index:50;pointer-events:none;touch-action:none;}

  .hint{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:55;
    background:var(--ink);color:#fff;padding:8px 18px;border-radius:999px;
    font-weight:700;font-size:.95rem;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;
  }
  .hint.show{opacity:.92;}

  footer{text-align:center;color:var(--ink3);font-size:.9rem;padding:20px;}

  @media (max-width:640px){
    #palette{left:12px;bottom:12px;padding:6px;gap:4px;}
    .tool{width:40px;height:40px;}
  }
</style>
</head>
<body>

<header>
  <div class="head-row">
    <div class="brand">
      <h1>주식 투자 × AI 활용</h1>
      <span class="sub">10주 완성 — 개념부터 실전 시스템까지</span>
    </div>
    <div class="head-actions">
      <button class="btn" id="toggleAll">⤢ 전체보기</button>
      <button class="btn" id="expandAll">▾ 모두 펼치기</button>
    </div>
  </div>
  <nav class="weeknav" id="weeknav"></nav>
</header>

<main id="main"></main>

<footer>강의용 프레젠테이션 · 키워드 클릭 시 설명 확장 · 좌하단 펜으로 판서 (드래그로 이동)</footer>

<!-- 판서 캔버스 -->
<canvas id="drawCanvas"></canvas>

<!-- 펜 팔레트 -->
<div id="palette">
  <span class="grip" id="grip" title="드래그하여 이동">⋮⋮</span>
  <button class="tool active" data-tool="select" title="선택 모드(판서 끔)">✋</button>
  <div class="divider"></div>
  <button class="tool" data-tool="black" title="검정 펜"><span class="swatch sw-black"></span></button>
  <button class="tool" data-tool="red" title="빨강 펜"><span class="swatch sw-red"></span></button>
  <button class="tool" data-tool="blue" title="파랑 펜"><span class="swatch sw-blue"></span></button>
  <button class="tool" data-tool="mark" title="형광펜"><span class="swatch sw-mark"></span></button>
  <div class="divider"></div>
  <button class="tool" data-tool="eraser" title="지우개">🩹</button>
  <button class="tool danger" data-tool="clear" title="전체 지우기">🗑</button>
</div>

<div class="hint" id="hint"></div>

<script>
/* ====================== 커리큘럼 데이터 ====================== */
const COURSE = [
  {
    week:1, tag:"WEEK 1 · 투자의 진리", title:"부는 어디서 생기는가 — 희소성에서 10배거까지",
    sub:"희소성 → 쇼티지 → 병목 → 가격결정권 → 진입장벽으로 이어지는 부의 사슬 (2026 최신 시장)",
    cards:[
      {c:"lav", chip:"1등의 법칙", t:"상대성 이론 — 가치는 비교값, 결국 1등이 더 간다",
       body:`<div class="lead">주식의 가치는 절대값이 아니라 <b>'비교값'</b>. 비교의 끝은 언제나 1등이다.</div>
       <ul><li>같은 PER도 금리·업종·<b>1등 대비</b>로 싸고 비쌈이 갈린다</li>
       <li>좋은 기업이라도 <b>경쟁사 비교는 필수</b> — <b>3등은 좋아도 안 갈 수 있고, 1등은 더 잘 간다</b></li>
       <li>돈·관심·수급이 1등으로 쏠린다 → 이것이 '1등의 법칙'</li>
       <li><b>2026 예</b>: AI 가속기의 엔비디아, HBM의 SK하이닉스 — 2등이 따라와도 1등 프리미엄은 유지</li>
       <li>매수 전 질문: "이건 이 판의 1등인가, 2·3등인가?"</li></ul>`},
      {c:"amber", chip:"1등 실전", t:"주도섹터·주도주 — 돈은 1등 섹터의 대장에 모인다",
       body:`<div class="lead">돈은 평등하게 흐르지 않는다. 먼저 <b>1등 섹터(주도섹터)</b>로 모이고, 그 안의 <b>대장주(주도주)</b>가 가장 크게 간다.</div>
       <ul><li>이것이 '1등의 법칙 + 멱법칙'의 <b>실전 형태</b></li>
       <li>찾는 순서: <b>매크로(큰 물결) → 주도섹터(돈 모이는 산업) → 주도주(그 섹터의 대장)</b></li>
       <li>주도섹터 판별: 거래대금·상승률·뉴스 빈도 <b>1위 산업</b></li>
       <li><b>후발주·2·3등 추격 금지</b> — 대장이 가장 안전하고 가장 멀리 간다</li>
       <li><b>2026 예</b>: AI 반도체가 주도섹터, 그 안의 엔비디아·SK하이닉스가 주도주 (5주차에서 로테이션·밸류체인으로 심화)</li></ul>`},
      {c:"gold", chip:"본질", t:"자본주의 경매의 원리 — 사용자가 매긴 값이 곧 가격",
       body:`<div class="lead">시장은 거대한 경매장. <b>사용자가 가치를 측정하는 순간, 그게 곧 가격</b>이다.</div>
       <ul><li>경매는 '평균'이 아니라 <b>가장 간절한 사람</b>이 값을 정한다</li>
       <li>그 가격 = <b>본질가치 + 프리미엄</b>. 프리미엄의 정체가 바로 '희소성'(다음 카드)</li>
       <li><b>2026 예</b>: 메모리 품귀로 PS5 가격 최대 $150 인상, PC 출하 -11% 전망 — 사겠다는 힘이 값을 끌어올린다</li>
       <li>식었을 때(공포) 사서, 끓을 때(탐욕) 판다</li></ul>`},
      {c:"sky", chip:"기회", t:"시간의 왜곡 — 공포가 좋은 주식을 과거 가격으로 되돌린다",
       body:`<div class="lead">상대성 이론: 중력이 강하면 시간이 일그러진다. <b>시장에선 '공포'가 그 중력</b>이다.</div>
       <ul><li>강한 공포(거시 충격·전쟁·규제·일시적 악재)가 주가의 시간을 <b>과거로 되돌린다</b></li>
       <li>펀더멘털은 그대로인데 가격만 몇 년 전 저점으로 회귀 → <b>저점 매수의 창</b></li>
       <li>리스크 큰 공포 시장일수록, 좋은 기업엔 가장 좋은 매수 기회가 열린다</li>
       <li>단, <b>'일시적 왜곡(공포)' vs '구조적 붕괴(진짜 쇠퇴)'</b>를 구분 — 눌린 용수철 vs 떨어지는 칼날</li>
       <li><b>사례</b>: 2020 코로나 패닉(우량주 급락 후 V자 반등), 2022 금리쇼크로 반토막 난 성장주 → 이후 AI주 폭등</li></ul>`},
      {c:"coral", chip:"제1원리", t:"희소성 — '보이지 않는 손'의 유일한 예외",
       body:`<div class="lead">아담 스미스: "가격은 시장이 정한다(보이지 않는 손)." <b>그 유일한 예외가 희소성</b>이다.</div>
       <ul><li>흔하면 싸고 귀하면 비싸다 — 모든 <b>프리미엄의 원천</b></li>
       <li>희소성이 생기면 가격을 '시장'이 아니라 <b>'파는 자(기업)'</b>가 정하기 시작한다</li>
       <li>핵심 질문: 이 회사가 파는 건 얼마나 <b>대체 불가능</b>한가?</li>
       <li><b>2026 예</b>: EUV 노광장비(ASML), 최첨단 HBM, 고급 GPU — 돈이 있어도 못 산다</li>
       <li>희소성 = 경매 프리미엄을 '구조화'한 것. 쇼티지와 만나면 폭발한다.</li></ul>`},
      {c:"amber", chip:"촉매", t:"쇼티지 현상 — 품절이 '생존'과 만나면 폭등",
       body:`<div class="lead">쇼티지 = 한마디로 <b>품절·부족</b>. 그게 생존과 연결되면 가격이 폭등한다.</div>
       <ul><li>수요는 그대로인데 공급이 막힘 → 가격은 <b>비선형</b>으로 튄다</li>
       <li>핵심은 "없으면 못 산다"가 아니라 <b>"없으면 안 돌아간다"</b>(생존 필수)</li>
       <li><b>2026 예</b>: AI發 메모리 슈퍼사이클 — "유례없는 공급부족", DRAM 수요 +30%</li>
       <li>단, 일시적 쇼티지는 증설로 풀린다 → <b>사이클 vs 구조</b> 구분이 핵심</li></ul>`},
      {c:"sky", chip:"구조", t:"병목 현상 — 사슬에서 가장 좁은 곳이 다 가진다",
       body:`<div class="lead">병목 = <b>수요·공급의 불균형</b>. 사려는 사람은 많은데 파는 곳이 그곳뿐이다.</div>
       <ul><li>생산 사슬 전체의 이익이 <b>가장 좁은 길목</b>으로 빨려 들어간다</li>
       <li>그 제품이 <b>생존에 필수</b>일 때 가격 폭등 → 희소성·가격결정과 한 몸</li>
       <li><b>2026 예</b>: AI 데이터센터의 이익이 GPU·HBM·HBM 본딩 장비(한미반도체)로 집중</li>
       <li>"이거 없으면 전부 멈춘다"를 찾으면 병목을 찾은 것</li></ul>`},

       <li>AI는 자료 정리, <b>최종 판단은 나</b></li>
       <li>이 6단계가 곧 1~10주 전체의 압축이다</li></ul>`},
    ]
  },
];

/* ====================== 렌더링 ====================== */
const main = document.getElementById('main');
const weeknav = document.getElementById('weeknav');
let currentWeek = 1;      // 숫자 또는 'all'
let allExpanded = false;

function cardHTML(card){
  const parts = card.t.split('—');
  const main = parts[0].trim();
  const sub = parts.slice(1).join('—').trim();
  const subHTML = sub ? `<div class="card-sub">${sub}</div>` : '';
  return `<div class="card" data-c="${card.c}">
    <div class="card-head">
      <span class="chip">${card.chip}</span>
      <div class="titlewrap">
        <div class="card-title">${main}</div>
        ${subHTML}
      </div>
      <span class="arrow">▾</span>
    </div>
    <div class="card-body"><div class="card-inner">${card.body}</div></div>
  </div>`;
}

function weekHTML(w){
  return `<section class="week-block" data-week="${w.week}">
    <div class="week-head">
      <span class="week-tag">${w.tag}</span>
      <h2 class="week-title serif">${w.title}</h2>
      <div class="week-sub">${w.sub}</div>
    </div>
    <div class="cards">${w.cards.map(cardHTML).join('')}</div>
  </section>`;
}

function render(){
  if(currentWeek==='all'){
    main.innerHTML = COURSE.map(weekHTML).join('');
  }else{
    main.innerHTML = weekHTML(COURSE[currentWeek-1]);
  }
  // 카드 클릭 = 펼치기/접기
  main.querySelectorAll('.card-head').forEach(h=>{
    h.addEventListener('click',()=>{
      if(currentTool!=='select') return; // 판서 중엔 무시
      h.parentElement.classList.toggle('open');
    });
  });
  if(allExpanded) main.querySelectorAll('.card').forEach(c=>c.classList.add('open'));
  updateNav();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildNav(){
  let html = COURSE.map(w=>`<button class="wk" data-w="${w.week}">${w.week}주</button>`).join('');
  html += `<button class="wk allbtn" data-w="all">전체</button>`;
  weeknav.innerHTML = html;
  weeknav.querySelectorAll('.wk').forEach(b=>{
    b.addEventListener('click',()=>{
      const v=b.dataset.w;
      currentWeek = (v==='all')?'all':parseInt(v,10);
      render();
    });
  });
}
function updateNav(){
  weeknav.querySelectorAll('.wk').forEach(b=>{
    const v=b.dataset.w;
    const on = (v==='all' && currentWeek==='all') || (parseInt(v,10)===currentWeek);
    b.classList.toggle('active', on && v!=='all');
    if(v!=='all') b.classList.toggle('active',on);
  });
}

document.getElementById('toggleAll').addEventListener('click',function(){
  currentWeek = (currentWeek==='all') ? 1 : 'all';
  this.classList.toggle('active', currentWeek==='all');
  render();
});
document.getElementById('expandAll').addEventListener('click',function(){
  allExpanded = !allExpanded;
  this.textContent = allExpanded ? '▴ 모두 접기' : '▾ 모두 펼치기';
  this.classList.toggle('active',allExpanded);
  main.querySelectorAll('.card').forEach(c=>c.classList.toggle('open',allExpanded));
});

buildNav(); render();

/* ====================== 판서 캔버스 ====================== */
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
let currentTool='select', drawing=false, lastX=0, lastY=0;

const TOOLS = {
  black :{color:'#1A1612', width:4,  alpha:1,   comp:'source-over'},
  red   :{color:'#E5342B', width:4,  alpha:1,   comp:'source-over'},
  blue  :{color:'#1E66E0', width:4,  alpha:1,   comp:'source-over'},
  mark  :{color:'#FFE94D', width:28, alpha:.42, comp:'source-over'},
  eraser:{color:'#000',    width:34, alpha:1,   comp:'destination-out'},
};

function sizeCanvas(){
  const dpr = window.devicePixelRatio||1;
  const prev = canvas.width ? canvas.toDataURL() : null;
  canvas.width  = window.innerWidth*dpr;
  canvas.height = window.innerHeight*dpr;
  canvas.style.width  = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(prev){
    const img=new Image();
    img.onload=()=>ctx.drawImage(img,0,0,window.innerWidth,window.innerHeight);
    img.src=prev;
  }
}
sizeCanvas();
window.addEventListener('resize',sizeCanvas);

function setTool(name){
  if(name==='clear'){ clearCanvas(); return; }
  currentTool=name;
  document.querySelectorAll('.tool').forEach(t=>t.classList.toggle('active',t.dataset.tool===name));
  canvas.style.pointerEvents = (name==='select') ? 'none' : 'auto';
  canvas.style.cursor = (name==='select') ? 'default' :
                        (name==='eraser') ? 'cell' : 'crosshair';
  const labels={select:'선택 모드 — 카드 클릭 가능',black:'검정 펜',red:'빨강 펜',blue:'파랑 펜',mark:'형광펜',eraser:'지우개'};
  showHint(labels[name]||'');
}
function clearCanvas(){ ctx.clearRect(0,0,canvas.width,canvas.height); showHint('판서 전체 지움'); }

document.querySelectorAll('.tool').forEach(btn=>{
  btn.addEventListener('click',()=>setTool(btn.dataset.tool));
});

function pos(e){
  const r=canvas.getBoundingClientRect();
  return [e.clientX-r.left, e.clientY-r.top];
}
function startDraw(e){
  if(currentTool==='select') return;
  drawing=true; [lastX,lastY]=pos(e); e.preventDefault();
}
function moveDraw(e){
  if(!drawing) return;
  const [x,y]=pos(e); const t=TOOLS[currentTool]; if(!t) return;
  ctx.globalCompositeOperation=t.comp;
  ctx.globalAlpha=t.alpha;
  ctx.strokeStyle=t.color;
  ctx.lineWidth=t.width;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
  lastX=x; lastY=y; e.preventDefault();
}
function endDraw(){ drawing=false; }

canvas.addEventListener('pointerdown',startDraw);
canvas.addEventListener('pointermove',moveDraw);
window.addEventListener('pointerup',endDraw);

/* ====================== 팔레트 드래그 (좌우/상하 이동) ====================== */
const palette=document.getElementById('palette');
const grip=document.getElementById('grip');
let dragging=false, offX=0, offY=0;
grip.addEventListener('pointerdown',e=>{
  dragging=true;
  const r=palette.getBoundingClientRect();
  offX=e.clientX-r.left; offY=e.clientY-r.top;
  palette.style.right='auto'; palette.style.bottom='auto';
  grip.setPointerCapture(e.pointerId);
});
grip.addEventListener('pointermove',e=>{
  if(!dragging) return;
  let x=e.clientX-offX, y=e.clientY-offY;
  const r=palette.getBoundingClientRect();
  x=Math.max(4,Math.min(window.innerWidth-r.width-4,x));
  y=Math.max(4,Math.min(window.innerHeight-r.height-4,y));
  palette.style.left=x+'px'; palette.style.top=y+'px';
});
grip.addEventListener('pointerup',()=>{dragging=false;});

/* ====================== 힌트 토스트 ====================== */
const hintEl=document.getElementById('hint'); let hintTimer=null;
function showHint(txt){
  if(!txt) return;
  hintEl.textContent=txt; hintEl.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer=setTimeout(()=>hintEl.classList.remove('show'),1400);
}

/* 키보드 단축키 */
document.addEventListener('keydown',e=>{
  const map={'1':'black','2':'red','3':'blue','4':'mark','0':'select'};
  if(map[e.key]) setTool(map[e.key]);
  if(e.key==='Escape') setTool('select');
  if(e.key==='Delete'||e.key==='Backspace'){ if(currentTool!=='select'){clearCanvas();} }
});
</script>
</body>
