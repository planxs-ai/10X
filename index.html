<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주식 투자 × AI 활용 — 10주 완성 커리큘럼</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Noto+Serif+KR:wght@600;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<style>
  :root{
    --bg:#FEFCF8; --bg2:#FFF9F0; --bg3:#FFF5E8; --card:#FFFFFF;
    --gold:#D4A853; --amber:#E8943A; --coral:#E87461; --sage:#7BA68C; --sky:#5B9BD5; --lav:#9B8EC4; --sub:#C9A66B;
    --ink:#1A1612; --ink2:#6B5E52; --ink3:#9E8E7E; --line:#EFE6D8; --line2:#F4ECDF;
    --radius:20px; --shadow:0 6px 24px rgba(26,22,18,.06); --shadow-h:0 18px 50px rgba(26,22,18,.12);
    --glow:0 10px 40px rgba(212,168,83,.18);
    --grad-gold:linear-gradient(135deg,#D4A853,#E8943A);
    --bar:68px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Pretendard','Plus Jakarta Sans',system-ui,sans-serif;
    color:var(--ink); min-height:100vh; line-height:1.6; overflow-x:hidden;
    background:var(--bg);
  }
  /* 분위기 레이어 */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(60vw 60vw at 82% -8%, rgba(232,148,58,.10), transparent 60%),
      radial-gradient(48vw 48vw at -6% 12%, rgba(212,168,83,.12), transparent 60%),
      radial-gradient(50vw 50vw at 50% 116%, rgba(123,166,140,.08), transparent 60%),
      linear-gradient(160deg,#FFF6EA 0%,#FEFCF8 46%,#FFF9F0 100%);}
  .latin{font-family:'Playfair Display','Noto Serif KR',serif;}
  .serif{font-family:'Noto Serif KR','Playfair Display',serif;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit;
    font-weight:700;font-size:clamp(.92rem,1.1vw,1.05rem);padding:9px 15px;border-radius:12px;cursor:pointer;
    transition:.2s cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#E5D6BD;}
  .btn:disabled{opacity:.32;cursor:default;transform:none;box-shadow:none;}
  .btn-gold{background:var(--grad-gold);color:#fff;border:none;box-shadow:var(--glow);}
  .btn-gold:hover{box-shadow:0 14px 44px rgba(212,168,83,.3);}
  ::selection{background:rgba(212,168,83,.25);}

  /* ===== 홈 ===== */
  #home{max-width:1180px;margin:0 auto;padding:clamp(40px,6vw,84px) clamp(18px,4vw,40px) 110px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(36px,6vw,70px);}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.01em;}
  .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--grad-gold);box-shadow:var(--glow);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.14em;
    text-transform:uppercase;font-size:.8rem;color:var(--amber);
    background:rgba(232,148,58,.10);padding:7px 15px;border-radius:999px;}
  .hero{max-width:840px;}
  .hero h1{font-family:'Noto Serif KR',serif;font-weight:900;letter-spacing:-.02em;margin:22px 0 0;
    font-size:clamp(1.6rem,4.3vw,3.4rem);line-height:1.14;word-break:keep-all;}
  .hero h1 .hl{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero h1 .ln1{white-space:nowrap;}
  .hero p{color:var(--ink2);font-weight:600;font-size:clamp(1.12rem,1.8vw,1.5rem);margin:22px 0 0;max-width:680px;line-height:1.55;}
  .stats{display:flex;gap:clamp(20px,3vw,44px);margin-top:34px;flex-wrap:wrap;}
  .stat .n{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.8rem,3vw,2.6rem);
    background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  .stat .l{color:var(--ink3);font-weight:700;font-size:.95rem;margin-top:6px;}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin:clamp(54px,7vw,84px) 0 26px;}
  .sec-head h2{font-family:'Noto Serif KR',serif;font-weight:800;font-size:clamp(1.5rem,2.4vw,2rem);margin:0;letter-spacing:-.01em;}
  .sec-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

  .toc{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,318px),1fr));gap:20px;}
  .toc-card{position:relative;background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:30px 28px 26px;cursor:pointer;overflow:hidden;
    transition:.28s cubic-bezier(.4,0,.2,1);}
  .toc-card::after{content:"";position:absolute;left:0;top:0;height:100%;width:5px;background:var(--accent,var(--gold));
    opacity:.0;transition:.28s;}
  .toc-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-h);border-color:#EADBC0;}
  .toc-card:hover::after{opacity:1;}
  .toc-card .num{font-family:'Playfair Display',serif;font-weight:900;font-size:2.5rem;line-height:1;
    width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;
    color:#fff;background:var(--accent,var(--gold));box-shadow:0 8px 22px rgba(26,22,18,.14);
    position:relative;}
  .toc-card .num::before{content:"";position:absolute;inset:2px 2px auto 2px;height:42%;border-radius:16px 16px 40px 40px;
    background:linear-gradient(180deg,rgba(255,255,255,.45),transparent);}
  .toc-card .wk{font-weight:800;letter-spacing:.12em;font-size:.78rem;text-transform:uppercase;color:var(--ink3);margin:18px 0 5px;}
  .toc-card h3{font-family:'Noto Serif KR',serif;font-weight:800;letter-spacing:-.01em;
    font-size:clamp(1.4rem,1.9vw,1.65rem);margin:0 0 9px;line-height:1.28;}
  .toc-card p{color:var(--ink2);font-size:1.02rem;margin:0;line-height:1.5;font-weight:500;}
  .toc-card .meta{margin-top:18px;padding-top:15px;border-top:1px dashed var(--line);
    display:flex;gap:16px;color:var(--ink3);font-weight:700;font-size:.86rem;align-items:center;}
  .toc-card .go{margin-left:auto;color:var(--accent,var(--gold));font-weight:800;transition:.22s;}
  .toc-card:hover .go{transform:translateX(4px);}
  .foot{margin-top:64px;text-align:center;color:var(--ink3);font-size:.92rem;font-weight:600;}

  /* ===== 덱 ===== */
  #deck{display:none;flex-direction:column;height:100dvh;}
  body.deckmode #home{display:none;}
  body.deckmode #deck{display:flex;}
  .deckbar{flex:none;height:var(--bar);display:flex;align-items:center;gap:12px;
    padding:0 clamp(14px,2.2vw,26px);background:rgba(255,250,243,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:relative;}
  .progress{position:absolute;left:0;bottom:-1px;height:3px;background:var(--grad-gold);width:0;
    transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:0 3px 3px 0;}
  .wk-pill{display:flex;align-items:center;gap:9px;font-family:'Noto Serif KR',serif;font-weight:800;
    font-size:clamp(1rem,1.4vw,1.25rem);white-space:nowrap;max-width:34vw;overflow:hidden;text-overflow:ellipsis;}
  .wk-pill .b{font-family:'Playfair Display',serif;color:#fff;background:var(--accent,var(--gold));
    border-radius:9px;padding:3px 10px;font-size:.9em;}
  .ptabs{display:flex;gap:7px;flex:1;overflow-x:auto;padding:6px 2px;align-items:center;scrollbar-width:none;}
  .ptabs::-webkit-scrollbar{display:none;}
  .ptab{flex:none;border:1px solid var(--line);background:var(--card);color:var(--ink3);font-family:inherit;
    font-weight:800;font-size:.98rem;width:38px;height:38px;border-radius:11px;cursor:pointer;transition:.16s;}
  .ptab:hover{border-color:var(--accent,var(--gold));color:var(--ink);transform:translateY(-2px);}
  .ptab.active{background:var(--accent,var(--gold));color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(26,22,18,.16);}
  .nav{display:flex;gap:7px;align-items:center;}

  .page{flex:1;display:flex;gap:22px;padding:clamp(18px,2.6vw,34px);overflow:hidden;}
  .page.wide{justify-content:center;}
  .pcard{flex:1 1 0;min-width:0;background:var(--card);border:1px solid var(--line2);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(24px,2.4vw,38px);
    display:flex;flex-direction:column;overflow:auto;position:relative;}
  .pcard::before{content:"";position:absolute;left:0;top:26px;bottom:26px;width:5px;border-radius:0 5px 5px 0;
    background:var(--cc,var(--gold));}
  .page.wide .pcard{flex:1 1 100%;max-width:1200px;}
  .pcard::-webkit-scrollbar{width:8px;} .pcard::-webkit-scrollbar-thumb{background:#EADBC0;border-radius:8px;}
  .chip{align-self:flex-start;font-weight:800;font-size:.84rem;letter-spacing:.04em;
    padding:6px 15px;border-radius:999px;background:var(--bg3);color:var(--amber);margin-bottom:15px;}
  .pcard[data-c="amber"]{--cc:var(--amber);} .pcard[data-c="amber"] .chip{background:#FDEBD8;color:var(--amber);}
  .pcard[data-c="coral"]{--cc:var(--coral);} .pcard[data-c="coral"] .chip{background:#FBE3DE;color:var(--coral);}
  .pcard[data-c="sage"]{--cc:var(--sage);} .pcard[data-c="sage"] .chip{background:#E4EFE8;color:#5f8c72;}
  .pcard[data-c="sky"]{--cc:var(--sky);} .pcard[data-c="sky"] .chip{background:#E1EEF9;color:var(--sky);}
  .pcard[data-c="lav"]{--cc:var(--lav);} .pcard[data-c="lav"] .chip{background:#ECE8F5;color:var(--lav);}
  .pcard[data-c="gold"]{--cc:var(--gold);}
  .pcard h3{font-family:'Noto Serif KR',serif;font-weight:800;letter-spacing:-.01em;line-height:1.22;margin:0;
    font-size:clamp(1.55rem,2.5vw,2.3rem);}
  .pcard .csub{color:var(--ink3);font-weight:700;margin-top:8px;font-size:clamp(1.05rem,1.4vw,1.32rem);line-height:1.3;}
  .body{margin-top:18px;font-size:clamp(1.12rem,1.5vw,1.48rem);color:var(--ink2);line-height:1.68;}
  .body .lead{font-weight:800;color:var(--ink);margin-bottom:8px;}
  .body b{color:var(--ink);font-weight:800;}
  .body ul{margin:14px 0 0;padding-left:2px;list-style:none;}
  .body li{position:relative;padding-left:28px;margin-bottom:11px;}
  .body li::before{content:"";position:absolute;left:2px;top:.62em;width:8px;height:8px;border-radius:50%;
    background:var(--cc,var(--gold));box-shadow:0 0 0 4px color-mix(in srgb,var(--cc,var(--gold)) 18%,transparent);}
  .box-dark{background:linear-gradient(135deg,#221E18,#16130F);color:#F5E4C3;border-radius:14px;padding:15px 19px;margin-top:18px;
    font-weight:700;line-height:1.55;border-left:5px solid var(--gold);box-shadow:0 10px 30px rgba(26,22,18,.2);}
  .box-red{background:linear-gradient(135deg,#E87461,#E25b47);color:#fff;border-radius:14px;padding:15px 19px;margin-top:18px;
    font-weight:700;line-height:1.55;box-shadow:0 10px 30px rgba(232,116,97,.3);}
  .box-dark b,.box-red b{color:#fff;}
  .box-dark::before{content:"🎯 ";} .box-red::before{content:"⚠️ ";}
  .ai{margin-top:18px;background:linear-gradient(135deg,#FFF6EA,#FFEFDC);border:1px dashed #E2C9A0;border-radius:14px;
    padding:15px 18px;font-size:.96em;color:#955b10;font-weight:600;line-height:1.6;}
  .ai::before{content:"🤖 ";font-weight:800;}

  .kws{display:flex;flex-wrap:wrap;gap:9px;margin-top:10px;}
  .kw{background:#fff;border:1.5px solid color-mix(in srgb,var(--cc,var(--gold)) 45%,#fff);
    color:var(--ink);font-weight:700;font-size:.92em;padding:5px 14px;border-radius:999px;
    box-shadow:0 2px 8px rgba(26,22,18,.05);}
  .ai .ln{display:block;margin-top:7px;padding-left:1.5em;text-indent:-1.5em;}

  /* 그래프 */
  .graphwrap{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:14px;}
  .graphbox{flex:1;min-height:0;border-radius:18px;border:1px solid var(--line2);overflow:hidden;
    background:radial-gradient(120% 120% at 50% 30%,#FFFDF9,#FFF4E4);box-shadow:inset 0 2px 22px rgba(212,168,83,.08);}
  .graphbox svg{display:block;width:100%;height:100%;}
  .glabel{font-family:'Pretendard',sans-serif;font-weight:800;}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-weight:700;color:var(--ink2);font-size:1.02rem;}
  .legend i{display:inline-block;width:15px;height:15px;border-radius:5px;margin-right:7px;vertical-align:-2px;box-shadow:0 2px 6px rgba(26,22,18,.12);}

  /* 펜 / 전체화면 */
  #drawCanvas{position:fixed;inset:0;z-index:50;pointer-events:none;touch-action:none;}
  #palette{position:fixed;left:24px;bottom:24px;z-index:60;background:rgba(255,255,255,.97);
    border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow-h);display:flex;align-items:center;gap:6px;padding:9px;touch-action:none;}
  .grip{cursor:grab;color:var(--ink3);font-size:1.4rem;padding:0 5px;user-select:none;letter-spacing:-3px;}
  .grip:active{cursor:grabbing;}
  .tool{width:46px;height:46px;border-radius:13px;border:2px solid var(--line);background:#fff;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:.16s;}
  .tool:hover{transform:translateY(-2px);}
  .tool.active{border-color:var(--ink);box-shadow:0 0 0 3px rgba(212,168,83,.35);}
  .swatch{width:24px;height:24px;border-radius:50%;}
  .sw-black{background:#1A1612;} .sw-red{background:#E5342B;} .sw-blue{background:#1E66E0;} .sw-mark{background:#FFE94D;border:1px solid #e3cf3f;}
  .divider{width:1px;height:34px;background:var(--line);margin:0 2px;}
  .tool.danger{color:var(--coral);}
  .hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:55;background:var(--ink);color:#fff;
    padding:9px 20px;border-radius:999px;font-weight:700;font-size:.95rem;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}
  .hint.show{opacity:.92;}

  @media (max-width:900px){
    .page{flex-direction:column;overflow:auto;}
    .wk-pill{max-width:48vw;}
    #palette{left:12px;bottom:12px;padding:7px;gap:4px;} .tool{width:40px;height:40px;}
  }
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<!-- ===== 홈 ===== -->
<section id="home">
  <div class="topbar">
    <div class="brand hero-el"><span class="dot">₩</span> 투자 × AI 클래스</div>
    <button class="btn hero-el" id="fsBtn">⛶ 전체화면</button>
  </div>
  <div class="hero">
    <span class="eyebrow hero-el">10주 완성 커리큘럼</span>
    <h1 class="hero-el"><span class="ln1">부는 어디서 생기는가,</span><br><span class="hl ln1">그리고 AI로 어떻게 찾는가</span></h1>
    <p class="hero-el">희소성·병목 같은 부의 원리부터, 섹터·수급·차트, 그리고 Claude·Gemini·ChatGPT를 부려 나만의 투자 시스템을 완성하기까지 — 한 번에.</p>
    <div class="stats hero-el">
      <div class="stat"><div class="n">10</div><div class="l">주차</div></div>
      <div class="stat"><div class="n" id="statCards">76</div><div class="l">개념 카드</div></div>
      <div class="stat"><div class="n" id="statPrompts">13</div><div class="l">AI 프롬프트</div></div>
      <div class="stat"><div class="n" id="statGraphs">4</div><div class="l">인터랙티브 그래프</div></div>
    </div>
  </div>
  <div class="sec-head"><h2>커리큘럼</h2><span class="line"></span></div>
  <div class="toc" id="toc"></div>
  <div class="foot">주차를 선택해 강의를 시작하세요 · 좌하단 펜으로 화면에 바로 판서 · ⛶ 로 전체화면</div>
</section>

<!-- ===== 덱 ===== -->
<section id="deck">
  <div class="deckbar">
    <button class="btn" id="homeBtn">☰ 목차</button>
    <span class="wk-pill" id="wkPill"></span>
    <div class="ptabs" id="ptabs"></div>
    <div class="nav">
      <button class="btn" id="prevBtn">◀</button>
      <button class="btn" id="nextBtn">▶</button>
      <button class="btn" id="fsBtn2">⛶</button>
    </div>
    <div class="progress" id="progress"></div>
  </div>
  <div class="page" id="page"></div>
</section>

<canvas id="drawCanvas"></canvas>
<div id="palette">
  <span class="grip" id="grip" title="드래그 이동">⋮⋮</span>
  <button class="tool active" data-tool="select" title="선택(판서 끔)">✋</button>
  <div class="divider"></div>
  <button class="tool" data-tool="black" title="검정"><span class="swatch sw-black"></span></button>
  <button class="tool" data-tool="red" title="빨강"><span class="swatch sw-red"></span></button>
  <button class="tool" data-tool="blue" title="파랑"><span class="swatch sw-blue"></span></button>
  <button class="tool" data-tool="mark" title="형광"><span class="swatch sw-mark"></span></button>
  <div class="divider"></div>
  <button class="tool" data-tool="eraser" title="지우개">🩹</button>
  <button class="tool danger" data-tool="clear" title="전체지우기">🗑</button>
</div>
<div class="hint" id="hint"></div>

<script>
/* ===================== 커리큘럼 데이터 ===================== */
const COURSE = [
  {
    week:1, tag:"WEEK 1 · 투자의 진리", title:"부는 어디서 생기는가 — 희소성에서 10배거까지",
    sub:"희소성 → 쇼티지 → 병목 → 가격결정권 → 진입장벽으로 이어지는 부의 사슬 (2026 최신 시장)",
    cards:[
      {c:"lav", chip:"1등의 법칙", t:"상대성 이론 — 가치는 비교값, 결국 1등이 더 간다",
       body:`<div class="lead">주식의 가치는 절대값이 아니라 <b>'비교값'</b>. 비교의 끝은 언제나 1등이다.</div>
       <ul><li>같은 PER도 금리·업종·<b>1등 대비</b>로 싸고 비쌈이 갈린다</li>
       <li>좋은 기업이라도 <b>경쟁사 비교는 필수</b> — <b>3등은 좋아도 안 갈 수 있고, 1등은 더 잘 간다</b></li>
       <li>돈·관심·수급이 1등으로 쏠린다 → 이것이 '1등의 법칙'</li>
       <li><b>2026 예</b>: AI 가속기의 엔비디아, HBM의 SK하이닉스 — 2등이 따라와도 1등 프리미엄은 유지</li>
       <li>매수 전 질문: "이건 이 판의 1등인가, 2·3등인가?"</li></ul>`},

function splitTitle(t){const p=t.split('—');return [p[0].trim(),p.slice(1).join('—').trim()];}
function buildPages(cards){const pages=[];let buf=[];const flush=()=>{if(buf.length){pages.push(buf);buf=[];}};
  cards.forEach(c=>{if(c.wide){flush();pages.push([c]);}else{buf.push(c);if(buf.length===2)flush();}});flush();return pages;}
function legColor(k){return ({gold:"#D4A853",amber:"#E8943A",coral:"#E87461",sky:"#5B9BD5",sage:"#7BA68C",lav:"#9B8EC4",sub:"#C9A66B",ink:"#1A1612"})[k]||k;}
function cardHTML(c){

  if(c.graph){
    return `<div class="pcard" data-c="${c.c}"><span class="chip">${c.chip}</span><h3>${main}</h3>${subHTML}
      <div class="graphwrap"><div class="graphbox" data-graph="${c.graph.kind}"></div>
      <div class="legend">${(c.graph.legend||[]).map(l=>`<span><i style="background:${legColor(l[0])}"></i>${l[1]}</span>`).join('')}</div>
      <div class="body" style="margin-top:10px">${c.graph.caption||''}</div></div></div>`;
  }
  return `<div class="pcard" data-c="${c.c}"><span class="chip">${c.chip}</span><h3>${main}</h3>${subHTML}
    <div class="body">${c.body||''}</div></div>`;
}

function openWeek(n){
  wk=n;page=0;document.body.classList.add('deckmode');
  const w=COURSE[n-1],ac=ACCENT[(n-1)%ACCENT.length];pagesCache=buildPages(w.cards);

}
function goHome(){clearGraphs();document.body.classList.remove('deckmode');}
function renderPage(){
  clearGraphs();
  const cards=pagesCache[page]||[];
  pageEl.className='page'+(cards.length===1&&cards[0].wide?' wide':'');
  pageEl.innerHTML=cards.map(cardHTML).join('');
  ptabsEl.querySelectorAll('.ptab').forEach((b,i)=>b.classList.toggle('active',i===page));
  document.getElementById('prevBtn').disabled=(page===0);
  document.getElementById('nextBtn').disabled=(page>=pagesCache.length-1);
  progressEl.style.width=((page+1)/pagesCache.length*100)+'%';
  if(window.gsap&&!reduceMo) gsap.from('#page .pcard',{y:26,opacity:0,duration:.5,stagger:.09,ease:'power3.out',clearProps:'all'});
  pageEl.querySelectorAll('.graphbox').forEach(box=>requestAnimationFrame(()=>renderGraph(box,GRAPHS[box.dataset.graph])));
}
function step(d){const np=page+d;if(np>=0&&np<pagesCache.length){page=np;renderPage();}}

/* ===================== 포스 그래프 (입체 노드 + 입자 흐름) ===================== */
let graphCleanups=[];
function clearGraphs(){graphCleanups.forEach(fn=>{try{fn();}catch(e){}});graphCleanups=[];}
function shade(hex,p){ // p>0 밝게 / p<0 어둡게
  const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const t=p<0?0:255,a=Math.abs(p);
  r=Math.round((t-r)*a+r);g=Math.round((t-g)*a+g);b=Math.round((t-b)*a+b);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function renderGraph(box,g){
  if(!g||!window.d3)return;
  box.innerHTML='';
  const W=box.clientWidth||900,H=box.clientHeight||460;
  const nodes=g.nodes.map(d=>Object.assign({},d));
  const links=g.links.map(l=>({source:l[0],target:l[1]}));
  nodes.forEach(d=>{const t=TIER[d.tier]||TIER[1];d._fs=d.fs||t.fs;d._h=d.h||t.h;d._w=Math.max(56,d.id.length*d._fs*0.62+30);d._base=GBASE[d.group]||"#D4A853";});
  const svg=d3.select(box).append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet');
  const defs=svg.append('defs');
  // 그룹별 그라데이션 + 글로우/섀도 필터
  Object.keys(GBASE).forEach(k=>{
    const base=GBASE[k],grad=defs.append('linearGradient').attr('id','g_'+k).attr('x1','0').attr('y1','0').attr('x2','0').attr('y2','1');
    grad.append('stop').attr('offset','0%').attr('stop-color',shade(base,.30));
    grad.append('stop').attr('offset','52%').attr('stop-color',base);
    grad.append('stop').attr('offset','100%').attr('stop-color',shade(base,-.16));
  });
  const sh=defs.append('filter').attr('id','soft').attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%');
  sh.append('feDropShadow').attr('dx',0).attr('dy',4).attr('stdDeviation',5).attr('flood-color','#1A1612').attr('flood-opacity',.18);
  const gl=defs.append('filter').attr('id','glow').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  gl.append('feGaussianBlur').attr('stdDeviation',7).attr('result','b');
  const fm=gl.append('feMerge');fm.append('feMergeNode').attr('in','b');fm.append('feMergeNode').attr('in','SourceGraphic');

  const isBig=d=>d.tier===0;
  const hasGrid=nodes.some(d=>d.gx!=null);
  const padX=Math.min(70,W*0.08), padY=Math.max(34,H*0.1);
  const gxTo=v=>padX+v*(W-2*padX), gyTo=v=>padY+v*(H-2*padY);
  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>(isBig(d.source)||isBig(d.target))?150:115).strength(hasGrid?.25:.55))
    .force('charge',d3.forceManyBody().strength(hasGrid?-260:-720))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collide',d3.forceCollide().radius(d=>d._w/2+16))
    .force('gx',d3.forceX(d=>d.gx!=null?gxTo(d.gx):W/2).strength(d=>d.gx!=null?0.92:0))
    .force('gy',d3.forceY(d=>d.gy!=null?gyTo(d.gy):H/2).strength(d=>d.gy!=null?0.92:0));
  // 화면 밖 이탈 방지 — 모든 노드가 항상 프레임 안에 보이도록 매 tick 클램프
  sim.on('tick',()=>{nodes.forEach(d=>{
    const hw=d._w/2+6,hh=d._h/2+6;
    if(d.x<hw)d.x=hw; else if(d.x>W-hw)d.x=W-hw;
    if(d.y<hh)d.y=hh; else if(d.y>H-hh)d.y=H-hh;
  });});

  const linkSel=svg.append('g').attr('stroke','#E0CDAD').attr('stroke-width',2.2).attr('stroke-linecap','round')
    .selectAll('line').data(links).join('line').attr('opacity',.7);
  const flow=svg.append('g').selectAll('circle').data(links).join('circle')
    .attr('r',3.6).attr('fill',d=>'#E8943A').attr('opacity',reduceMo?0:.9).attr('filter','url(#glow)');
  links.forEach(l=>{l._t=Math.random();l._spd=0.0022+Math.random()*0.0018;});

  const node=svg.append('g').selectAll('g').data(nodes).join('g').attr('class','gnode').style('cursor','grab')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  const inner=node.append('g').attr('class','inr');
  inner.filter(d=>d.pulse).append('circle').attr('class','halo')
    .attr('r',d=>d._w/2+10).attr('fill',d=>d._base).attr('opacity',.16);
  inner.append('rect').attr('x',d=>-d._w/2).attr('y',d=>-d._h/2).attr('width',d=>d._w).attr('height',d=>d._h)
    .attr('rx',d=>d._h/2).attr('fill',d=>`url(#g_${d.group})`).attr('stroke','#fff').attr('stroke-width',2.4)
    .attr('filter',d=>d.glow?'url(#glow)':'url(#soft)');
  // 상단 광택
  inner.append('rect').attr('x',d=>-d._w/2+6).attr('y',d=>-d._h/2+3).attr('width',d=>d._w-12).attr('height',d=>d._h*0.42)
    .attr('rx',d=>d._h*0.21).attr('fill','#fff').attr('opacity',.22).attr('pointer-events','none');
  inner.append('text').attr('class','glabel').text(d=>d.id).attr('text-anchor','middle').attr('dy','.34em')
    .attr('font-size',d=>d._fs).attr('fill',d=>d.group==='bottle'?'#3a2606':'#fff').attr('pointer-events','none');

  // 호버 하이라이트
  const adj={};links.forEach(l=>{(adj[l.source.id||l.source]=adj[l.source.id||l.source]||new Set()).add(l.target.id||l.target);
    (adj[l.target.id||l.target]=adj[l.target.id||l.target]||new Set()).add(l.source.id||l.source);});
  node.on('mouseenter',(e,d)=>{
    node.style('opacity',o=>o.id===d.id||(adj[d.id]&&adj[d.id].has(o.id))?1:.16);
    linkSel.attr('opacity',l=>(l.source.id===d.id||l.target.id===d.id)?.95:.08)
      .attr('stroke',l=>(l.source.id===d.id||l.target.id===d.id)?'#D4A853':'#E0CDAD');
    flow.attr('opacity',l=>reduceMo?0:((l.source.id===d.id||l.target.id===d.id)?1:.12));
  }).on('mouseleave',()=>{node.style('opacity',1);linkSel.attr('opacity',.7).attr('stroke','#E0CDAD');flow.attr('opacity',reduceMo?0:.9);});

  // 등장 모션 + 펄스
  if(window.gsap&&!reduceMo){
    gsap.from(inner.nodes(),{scale:.55,opacity:0,transformOrigin:'center',duration:.6,stagger:.035,ease:'back.out(1.5)'});
    inner.filter(d=>d.pulse).select('.halo').each(function(){gsap.to(this,{attr:{r:'+=14'},opacity:.05,duration:1.7,repeat:-1,yoyo:true,ease:'sine.inOut'});});
  }

  // 통합 렌더 루프 (sim 정착 후에도 입자 계속 흐름)
  let raf;
  function frame(){
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x||W/2},${d.y||H/2})`);
    if(!reduceMo) flow.attr('cx',d=>{d._t+=d._spd;if(d._t>1)d._t-=1;return d.source.x+(d.target.x-d.source.x)*d._t;})
                     .attr('cy',d=>d.source.y+(d.target.y-d.source.y)*d._t)
                     .attr('fill',d=>shade(d.source._base||'#E8943A',.05));
    raf=requestAnimationFrame(frame);
  }
  frame();
  graphCleanups.push(()=>{cancelAnimationFrame(raf);sim.stop();if(window.gsap)gsap.killTweensOf(inner.nodes());});
}
let rzT;window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{if(document.body.classList.contains('deckmode'))renderPage();sizeCanvas();},240);});

/* ===================== 전체화면 ===================== */
function toggleFS(){try{if(!document.fullscreenElement){(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen).call(document.documentElement);}else{(document.exitFullscreen||document.webkitExitFullscreen).call(document);}}catch(e){showHint('이 브라우저에선 전체화면이 제한됩니다');}}
document.getElementById('fsBtn').addEventListener('click',toggleFS);
document.getElementById('fsBtn2').addEventListener('click',toggleFS);

/* ===================== 판서 캔버스 ===================== */
const canvas=document.getElementById('drawCanvas'),ctx=canvas.getContext('2d');
let currentTool='select',drawing=false,lastX=0,lastY=0;
const TOOLS={black:{color:'#1A1612',width:4,alpha:1,comp:'source-over'},red:{color:'#E5342B',width:4,alpha:1,comp:'source-over'},
  blue:{color:'#1E66E0',width:4,alpha:1,comp:'source-over'},mark:{color:'#FFE94D',width:28,alpha:.42,comp:'source-over'},
  eraser:{color:'#000',width:34,alpha:1,comp:'destination-out'}};
function sizeCanvas(){const dpr=window.devicePixelRatio||1,prev=canvas.width?canvas.toDataURL():null;
  canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
  if(prev){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,innerWidth,innerHeight);img.src=prev;}}
sizeCanvas();
function setTool(name){if(name==='clear'){ctx.clearRect(0,0,canvas.width,canvas.height);showHint('판서 지움');return;}
  currentTool=name;document.querySelectorAll('.tool').forEach(t=>t.classList.toggle('active',t.dataset.tool===name));
  canvas.style.pointerEvents=(name==='select')?'none':'auto';canvas.style.cursor=(name==='select')?'default':(name==='eraser')?'cell':'crosshair';
  showHint({select:'선택 모드',black:'검정 펜',red:'빨강 펜',blue:'파랑 펜',mark:'형광펜',eraser:'지우개'}[name]||'');}
document.querySelectorAll('.tool').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));
function pos(e){const r=canvas.getBoundingClientRect();return [e.clientX-r.left,e.clientY-r.top];}
canvas.addEventListener('pointerdown',e=>{if(currentTool==='select')return;drawing=true;[lastX,lastY]=pos(e);e.preventDefault();});
canvas.addEventListener('pointermove',e=>{if(!drawing)return;const[x,y]=pos(e),t=TOOLS[currentTool];if(!t)return;
  ctx.globalCompositeOperation=t.comp;ctx.globalAlpha=t.alpha;ctx.strokeStyle=t.color;ctx.lineWidth=t.width;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;e.preventDefault();});
window.addEventListener('pointerup',()=>drawing=false);
const palette=document.getElementById('palette'),grip=document.getElementById('grip');let dg=false,ox=0,oy=0;
grip.addEventListener('pointerdown',e=>{dg=true;const r=palette.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;palette.style.right='auto';palette.style.bottom='auto';grip.setPointerCapture(e.pointerId);});
grip.addEventListener('pointermove',e=>{if(!dg)return;const r=palette.getBoundingClientRect();
  let x=Math.max(4,Math.min(innerWidth-r.width-4,e.clientX-ox)),y=Math.max(4,Math.min(innerHeight-r.height-4,e.clientY-oy));palette.style.left=x+'px';palette.style.top=y+'px';});
grip.addEventListener('pointerup',()=>dg=false);
const hintEl=document.getElementById('hint');let hintT;
function showHint(t){if(!t)return;hintEl.textContent=t;hintEl.classList.add('show');clearTimeout(hintT);hintT=setTimeout(()=>hintEl.classList.remove('show'),1400);}
document.addEventListener('keydown',e=>{const m={'1':'black','2':'red','3':'blue','4':'mark','0':'select'};if(m[e.key])setTool(m[e.key]);if(e.key==='Escape')setTool('select');});

renderHome();
(function(){
  const cardsN=COURSE.reduce((s,w)=>s+w.cards.length,0);
  const promptN=COURSE.reduce((s,w)=>s+w.cards.reduce((x,c)=>x+(((c.body||'').match(/class="ai"/g)||[]).length),0),0);
  const graphN=COURSE.reduce((s,w)=>s+w.cards.filter(c=>c.graph).length,0);
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('statCards',cardsN);set('statPrompts',promptN);set('statGraphs',graphN);
})();
</script>
