<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>주식 투자 × AI 활용 — 10주 완성 커리큘럼</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Noto+Serif+KR:wght@600;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<style>
  :root{
    --bg:#FEFCF8; --bg2:#FFF9F0; --bg3:#FFF5E8; --card:#FFFFFF;
    --gold:#D4A853; --amber:#E8943A; --coral:#E87461; --sage:#7BA68C; --sky:#5B9BD5; --lav:#9B8EC4; --sub:#C9A66B;
    --ink:#1A1612; --ink2:#6B5E52; --ink3:#9E8E7E; --line:#EFE6D8; --line2:#F4ECDF;
    --radius:20px; --shadow:0 6px 24px rgba(26,22,18,.06); --shadow-h:0 18px 50px rgba(26,22,18,.12);
    --glow:0 10px 40px rgba(212,168,83,.18);
    --grad-gold:linear-gradient(135deg,#D4A853,#E8943A);
    --bar:68px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Pretendard','Plus Jakarta Sans',system-ui,sans-serif;
    color:var(--ink); min-height:100vh; line-height:1.6; overflow-x:hidden;
    background:var(--bg);
  }
  /* 분위기 레이어 */
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:
      radial-gradient(60vw 60vw at 82% -8%, rgba(232,148,58,.10), transparent 60%),
      radial-gradient(48vw 48vw at -6% 12%, rgba(212,168,83,.12), transparent 60%),
      radial-gradient(50vw 50vw at 50% 116%, rgba(123,166,140,.08), transparent 60%),
      linear-gradient(160deg,#FFF6EA 0%,#FEFCF8 46%,#FFF9F0 100%);}
  .latin{font-family:'Playfair Display','Noto Serif KR',serif;}
  .serif{font-family:'Noto Serif KR','Playfair Display',serif;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);font-family:inherit;
    font-weight:700;font-size:clamp(.92rem,1.1vw,1.05rem);padding:9px 15px;border-radius:12px;cursor:pointer;
    transition:.2s cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:#E5D6BD;}
  .btn:disabled{opacity:.32;cursor:default;transform:none;box-shadow:none;}
  .btn-gold{background:var(--grad-gold);color:#fff;border:none;box-shadow:var(--glow);}
  .btn-gold:hover{box-shadow:0 14px 44px rgba(212,168,83,.3);}
  ::selection{background:rgba(212,168,83,.25);}

  /* ===== 홈 ===== */
  #home{max-width:1180px;margin:0 auto;padding:clamp(20px,3vw,36px) clamp(18px,4vw,40px) 110px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(16px,2.4vw,26px);}
  .brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.01em;}
  .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--grad-gold);box-shadow:var(--glow);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;}
  .eyebrow{display:inline-flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.14em;
    text-transform:uppercase;font-size:.8rem;color:var(--amber);
    background:rgba(232,148,58,.10);padding:7px 15px;border-radius:999px;}
  .hero{max-width:840px;}
  .hero h1{font-family:'Noto Serif KR',serif;font-weight:900;letter-spacing:-.02em;margin:12px 0 0;
    font-size:clamp(1.3rem,3.1vw,2.5rem);line-height:1.16;word-break:keep-all;white-space:nowrap;}
  .hero h1 .hl{background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero h1 .ln1{white-space:nowrap;}
  .hero p{color:var(--ink2);font-weight:600;font-size:clamp(1.02rem,1.4vw,1.2rem);margin:10px 0 0;max-width:720px;line-height:1.45;}
  .stats{display:flex;gap:clamp(20px,3vw,44px);margin-top:18px;flex-wrap:wrap;}
  .stat .n{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(1.5rem,2.2vw,2.05rem);
    background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  .stat .l{color:var(--ink3);font-weight:700;font-size:.95rem;margin-top:6px;}
  .sec-head{display:flex;align-items:baseline;gap:14px;margin:clamp(14px,2vw,22px) 0 16px;}
  .sec-head h2{font-family:'Noto Serif KR',serif;font-weight:800;font-size:clamp(1.5rem,2.4vw,2rem);margin:0;letter-spacing:-.01em;}
  .sec-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}

  .toc{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,318px),1fr));gap:20px;}
  .toc-card{position:relative;background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:30px 28px 26px;cursor:pointer;overflow:hidden;
    transition:.28s cubic-bezier(.4,0,.2,1);}
  .toc-card::after{content:"";position:absolute;left:0;top:0;height:100%;width:5px;background:var(--accent,var(--gold));
    opacity:.0;transition:.28s;}
  .toc-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-h);border-color:#EADBC0;}
  .toc-card:hover::after{opacity:1;}
  .toc-card .num{font-family:'Playfair Display',serif;font-weight:900;font-size:2.5rem;line-height:1;
    width:64px;height:64px;border-radius:18px;display:flex;align-items:center;justify-content:center;
    color:#fff;background:var(--accent,var(--gold));box-shadow:0 8px 22px rgba(26,22,18,.14);
    position:relative;}
  .toc-card .num::before{content:"";position:absolute;inset:2px 2px auto 2px;height:42%;border-radius:16px 16px 40px 40px;
    background:linear-gradient(180deg,rgba(255,255,255,.45),transparent);}
  .toc-card .wk{font-weight:800;letter-spacing:.12em;font-size:.78rem;text-transform:uppercase;color:var(--ink3);margin:18px 0 5px;}
  .toc-card h3{font-family:'Noto Serif KR',serif;font-weight:800;letter-spacing:-.01em;
    font-size:clamp(1.4rem,1.9vw,1.65rem);margin:0 0 9px;line-height:1.28;}
  .toc-card p{color:var(--ink2);font-size:1.02rem;margin:0;line-height:1.5;font-weight:500;}
  .toc-card .meta{margin-top:18px;padding-top:15px;border-top:1px dashed var(--line);
    display:flex;gap:16px;color:var(--ink3);font-weight:700;font-size:.86rem;align-items:center;}
  .toc-card .go{margin-left:auto;color:var(--accent,var(--gold));font-weight:800;transition:.22s;}
  .toc-card:hover .go{transform:translateX(4px);}
  .foot{margin-top:64px;text-align:center;color:var(--ink3);font-size:.92rem;font-weight:600;}

  /* ===== 덱 ===== */
  #deck{display:none;flex-direction:column;height:100dvh;}
  body.deckmode #home{display:none;}
  body.deckmode #deck{display:flex;}
  .deckbar{flex:none;height:var(--bar);display:flex;align-items:center;gap:12px;
    padding:0 clamp(14px,2.2vw,26px);background:rgba(255,250,243,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line);position:relative;}
  .progress{position:absolute;left:0;bottom:-1px;height:3px;background:var(--grad-gold);width:0;
    transition:width .4s cubic-bezier(.4,0,.2,1);border-radius:0 3px 3px 0;}
  .wk-pill{display:flex;align-items:center;gap:9px;font-family:'Noto Serif KR',serif;font-weight:800;
    font-size:clamp(1rem,1.4vw,1.25rem);white-space:nowrap;max-width:34vw;overflow:hidden;text-overflow:ellipsis;}
  .wk-pill .b{font-family:'Playfair Display',serif;color:#fff;background:var(--accent,var(--gold));
    border-radius:9px;padding:3px 10px;font-size:.9em;}
  .ptabs{display:flex;gap:7px;flex:1;overflow-x:auto;padding:6px 2px;align-items:center;scrollbar-width:none;}
  .ptabs::-webkit-scrollbar{display:none;}
  .ptab{flex:none;border:1px solid var(--line);background:var(--card);color:var(--ink3);font-family:inherit;
    font-weight:800;font-size:.98rem;width:38px;height:38px;border-radius:11px;cursor:pointer;transition:.16s;}
  .ptab:hover{border-color:var(--accent,var(--gold));color:var(--ink);transform:translateY(-2px);}
  .ptab.active{background:var(--accent,var(--gold));color:#fff;border-color:transparent;box-shadow:0 6px 18px rgba(26,22,18,.16);}
  .nav{display:flex;gap:7px;align-items:center;}

  .page{flex:1;display:flex;gap:22px;padding:clamp(18px,2.6vw,34px);overflow:hidden;}
  .page.wide{justify-content:center;}
  .pcard{flex:1 1 0;min-width:0;background:var(--card);border:1px solid var(--line2);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(24px,2.4vw,38px);
    display:flex;flex-direction:column;overflow:auto;position:relative;}
  .pcard::before{content:"";position:absolute;left:0;top:26px;bottom:26px;width:5px;border-radius:0 5px 5px 0;
    background:var(--cc,var(--gold));}
  .page.wide .pcard{flex:1 1 100%;max-width:1200px;}
  .pcard::-webkit-scrollbar{width:8px;} .pcard::-webkit-scrollbar-thumb{background:#EADBC0;border-radius:8px;}
  .chip{align-self:flex-start;font-weight:800;font-size:.84rem;letter-spacing:.04em;
    padding:6px 15px;border-radius:999px;background:var(--bg3);color:var(--amber);margin-bottom:15px;}
  .pcard[data-c="amber"]{--cc:var(--amber);} .pcard[data-c="amber"] .chip{background:#FDEBD8;color:var(--amber);}
  .pcard[data-c="coral"]{--cc:var(--coral);} .pcard[data-c="coral"] .chip{background:#FBE3DE;color:var(--coral);}
  .pcard[data-c="sage"]{--cc:var(--sage);} .pcard[data-c="sage"] .chip{background:#E4EFE8;color:#5f8c72;}
  .pcard[data-c="sky"]{--cc:var(--sky);} .pcard[data-c="sky"] .chip{background:#E1EEF9;color:var(--sky);}
  .pcard[data-c="lav"]{--cc:var(--lav);} .pcard[data-c="lav"] .chip{background:#ECE8F5;color:var(--lav);}
  .pcard[data-c="gold"]{--cc:var(--gold);}
  .pcard h3{font-family:'Noto Serif KR',serif;font-weight:800;letter-spacing:-.01em;line-height:1.22;margin:0;
    font-size:clamp(1.55rem,2.5vw,2.3rem);}
  .pcard .csub{color:var(--ink3);font-weight:700;margin-top:8px;font-size:clamp(1.05rem,1.4vw,1.32rem);line-height:1.3;}
  .body{margin-top:18px;font-size:clamp(1.12rem,1.5vw,1.48rem);color:var(--ink2);line-height:1.68;}
  .pcard>.body{flex:1;display:flex;flex-direction:column;min-height:0;}
  .body .lead{font-weight:800;color:var(--ink);margin-bottom:8px;}
  .body b{color:var(--ink);font-weight:800;}
  .body ul{margin:14px 0 0;padding-left:2px;list-style:none;}
  .body li{position:relative;padding-left:28px;margin-bottom:11px;}
  .body li::before{content:"";position:absolute;left:2px;top:.62em;width:8px;height:8px;border-radius:50%;
    background:var(--cc,var(--gold));box-shadow:0 0 0 4px color-mix(in srgb,var(--cc,var(--gold)) 18%,transparent);}
  .box-dark{background:linear-gradient(135deg,#221E18,#16130F);color:#F5E4C3;border-radius:14px;padding:15px 19px;margin-top:18px;
    font-weight:700;line-height:1.55;border-left:5px solid var(--gold);box-shadow:0 10px 30px rgba(26,22,18,.2);}
  .box-red{background:linear-gradient(135deg,#E87461,#E25b47);color:#fff;border-radius:14px;padding:15px 19px;margin-top:18px;
    font-weight:700;line-height:1.55;box-shadow:0 10px 30px rgba(232,116,97,.3);}
  .box-dark b,.box-red b{color:#fff;}
  /* 카드 본문 마지막 요소가 강조박스면 하단으로 밀어붙여 좌우 카드 라인을 맞춘다(그래프 캡션은 제외) */
  .pcard>.body>.box-dark:last-child,.pcard>.body>.box-red:last-child,
  .pcard>.body>.point-box:last-child,.pcard>.body>.rc-wrap:last-child{
    margin-top:auto!important;}
  .box-dark::before{content:"🎯 ";} .box-red::before{content:"⚠️ ";}
  .ai{margin-top:18px;background:linear-gradient(135deg,#FFF6EA,#FFEFDC);border:1px dashed #E2C9A0;border-radius:14px;
    padding:15px 18px;font-size:.96em;color:#955b10;font-weight:600;line-height:1.6;}
  .ai::before{content:"🤖 ";font-weight:800;}

  /* 프레임워크 프롬프트 — 단계별 플로우 카드 */
  .pf-wrap{display:flex;flex-direction:column;gap:12px;margin-top:16px;}
  .pf-rule{background:linear-gradient(135deg,#221E18,#16130F);color:#F5E4C3;border-radius:14px;
    padding:14px 18px;font-weight:700;line-height:1.6;font-size:.98rem;box-shadow:0 8px 24px rgba(26,22,18,.16);}
  .pf-rule b{color:#fff;}
  .pf-step{--pc:var(--gold);border-radius:14px;padding:15px 18px 16px;background:#fff;
    border:1px solid var(--line2);border-left:5px solid var(--pc);box-shadow:var(--shadow);}
  .pf-head{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
  .pf-num{flex:none;width:28px;height:28px;border-radius:9px;background:var(--pc);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:900;font-family:'Playfair Display',serif;font-size:.95rem;}
  .pf-title{font-weight:800;font-size:1.04rem;color:var(--ink);}
  .pf-body{color:var(--ink2);font-size:.97rem;line-height:1.65;}
  .pf-body b{color:var(--ink);font-weight:800;}
  .pf-final{background:var(--bg3);border:1px dashed #E2C9A0;border-radius:14px;padding:15px 18px;
    font-size:.97rem;color:#7a5a1c;font-weight:600;line-height:1.65;}
  .pf-final b{color:#5a3d0a;}
  .pf-out{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
  .pf-out span{background:var(--ink);color:#fff;font-weight:700;font-size:.82rem;padding:5px 12px;border-radius:999px;}

  /* 용어 해설 */
  .term-note{background:var(--bg3);border-radius:12px;padding:11px 15px 11px 15px;margin-top:14px;
    font-size:.9rem;color:var(--ink2);line-height:1.6;border-left:3px solid var(--sky);}
  .term-note b{color:var(--ink);font-weight:800;}
  .term-note .tn-label{display:block;font-weight:800;color:var(--sky);font-size:.82rem;margin-bottom:3px;letter-spacing:.02em;}

  /* 관전 포인트 (구 watch) — 위 내용과 여백을 두고, 독립된 톤으로 */
  .point-box{margin-top:24px;padding-top:18px;border-top:1px dashed var(--line);}
  .point-label{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.85rem;color:#9a6a12;
    background:#FDF1DA;border:1px solid #EFDBAA;padding:5px 13px;border-radius:999px;margin-bottom:10px;}
  .point-text{color:var(--ink2);font-weight:600;line-height:1.6;font-size:.98rem;}
  .point-text b{color:var(--ink);font-weight:800;}

  /* 관련 기업 */
  .rc-wrap{margin-top:14px;}
  .rc-label{font-size:.8rem;font-weight:800;color:var(--ink3);margin-bottom:7px;letter-spacing:.02em;}
  .rc-chips{display:flex;gap:8px;flex-wrap:wrap;}
  .rc-chip{display:inline-flex;align-items:center;gap:5px;background:#fff;border:1.3px solid var(--line2);
    color:var(--ink);font-weight:700;font-size:.88rem;padding:5px 13px 5px 10px;border-radius:999px;box-shadow:0 2px 6px rgba(26,22,18,.05);}
  .rc-chip::before{content:"🏢";font-size:.82em;}

  /* 섹터 → 종목 그룹 */
  .sc-group{margin-bottom:18px;}
  .sc-group:last-child{margin-bottom:0;}
  .sc-label{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:.98rem;color:#fff;
    background:var(--sc,var(--gold));padding:6px 16px;border-radius:999px;margin-bottom:10px;box-shadow:0 4px 12px rgba(26,22,18,.12);}
  .sc-chips{display:flex;gap:8px;flex-wrap:wrap;padding-left:2px;}

  /* 프레임워크 탭 UI */
  .fw-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line);}
  .fw-tab-btn{border:1.3px solid var(--line);background:#fff;color:var(--ink2);font-family:inherit;
    font-weight:800;font-size:.92rem;padding:8px 15px;border-radius:10px;cursor:pointer;transition:.15s;}
  .fw-tab-btn:hover{border-color:var(--gold);color:var(--ink);}
  .fw-tab-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .fw-panel{display:none;}
  .fw-panel.active{display:block;}
  .fw-sub{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);}
  .fw-sub:first-child{margin-top:0;padding-top:0;border-top:none;}
  .fw-sub-title{font-weight:800;color:var(--ink);font-size:1.08rem;margin-bottom:6px;}
  .fw-q{color:var(--ink3);font-weight:600;font-style:italic;font-size:.92rem;margin-bottom:10px;line-height:1.5;}
  .fw-crit{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
  .fw-crit-row{display:flex;gap:10px;font-size:.95rem;line-height:1.5;flex-wrap:wrap;}
  .fw-crit-k{flex:none;font-weight:800;color:var(--ink);min-width:120px;}
  .fw-crit-g{color:#3a7d54;}
  .fw-crit-r{color:var(--coral);}
  .fw-verdict{font-weight:700;color:var(--ink);background:var(--bg3);padding:9px 13px;border-radius:9px;
    font-size:.92rem;line-height:1.5;margin-top:4px;}
  .fw-note{background:var(--bg3);border-left:3px solid var(--sky);border-radius:9px;padding:9px 13px;
    margin-top:10px;font-size:.9rem;color:var(--ink2);line-height:1.55;}

  .kws{display:flex;flex-wrap:wrap;gap:9px;margin-top:10px;}
  .kw{background:#fff;border:1.5px solid color-mix(in srgb,var(--cc,var(--gold)) 45%,#fff);
    color:var(--ink);font-weight:700;font-size:.92em;padding:5px 14px;border-radius:999px;
    box-shadow:0 2px 8px rgba(26,22,18,.05);}
  .ai .ln{display:block;margin-top:7px;padding-left:1.5em;text-indent:-1.5em;}

  /* 그래프 */
  .graphwrap{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:14px;}
  .graphbox{flex:1;min-height:0;border-radius:18px;border:1px solid var(--line2);overflow:hidden;
    background:radial-gradient(120% 120% at 50% 30%,#FFFDF9,#FFF4E4);box-shadow:inset 0 2px 22px rgba(212,168,83,.08);}
  .graphbox svg{display:block;width:100%;height:100%;}
  .glabel{font-family:'Pretendard',sans-serif;font-weight:800;}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-weight:700;color:var(--ink2);font-size:1.02rem;}
  .legend i{display:inline-block;width:15px;height:15px;border-radius:5px;margin-right:7px;vertical-align:-2px;box-shadow:0 2px 6px rgba(26,22,18,.12);}

  /* 게시판 */
  .board-fab{position:fixed;right:24px;bottom:24px;z-index:58;background:var(--grad-gold);color:#fff;
    border:none;border-radius:999px;padding:13px 20px;font-weight:800;font-size:1rem;cursor:pointer;
    box-shadow:var(--glow);display:flex;align-items:center;gap:8px;transition:.2s;}
  .board-fab:hover{transform:translateY(-3px);box-shadow:0 16px 44px rgba(212,168,83,.32);}
  .board-fab .dotlive{width:8px;height:8px;border-radius:50%;background:#5CD65C;box-shadow:0 0 0 0 rgba(92,214,92,.6);
    animation:pulse-dot 1.6s infinite;}
  @keyframes pulse-dot{0%{box-shadow:0 0 0 0 rgba(92,214,92,.55);}70%{box-shadow:0 0 0 8px rgba(92,214,92,0);}100%{box-shadow:0 0 0 0 rgba(92,214,92,0);}}
  #board{display:none;position:fixed;inset:0;z-index:80;background:rgba(26,22,18,.44);backdrop-filter:blur(3px);
    align-items:center;justify-content:center;padding:clamp(12px,3vw,40px);}
  body.boardmode #board{display:flex;}
  .board-panel{width:min(720px,100%);max-height:min(88vh,900px);background:var(--card);border-radius:24px;
    box-shadow:0 30px 80px rgba(26,22,18,.28);display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--line2);}

  /* 펜 / 전체화면 */
  #drawCanvas{position:fixed;inset:0;z-index:50;pointer-events:none;touch-action:none;}

  .swatch{width:24px;height:24px;border-radius:50%;}

  .divider{width:1px;height:34px;background:var(--line);margin:0 2px;}

  .hint{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:55;background:var(--ink);color:#fff;
    padding:9px 20px;border-radius:999px;font-weight:700;font-size:.95rem;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;}

<script>
/* ===================== 커리큘럼 데이터 ===================== */
const COURSE = [
  {
    week:1, tag:"WEEK 1 · 투자의 진리", title:"부는 어디서 생기는가 — 희소성에서 10배거까지",
    sub:"희소성 → 쇼티지 → 병목 → 가격결정권 → 진입장벽으로 이어지는 부의 사슬 (2026 최신 시장)",
    cards:[
      {c:"lav", chip:"1등의 법칙", t:"상대성 이론 — 가치는 비교값, 결국 1등이 더 간다",
       body:`<div class="lead">주식의 가치는 절대값이 아니라 <b>'비교값'</b>. 비교의 끝은 언제나 1등이다.</div>
       <ul><li>같은 PER도 금리·업종·<b>1등 대비</b>로 싸고 비쌈이 갈린다</li>
       <li>좋은 기업이라도 <b>경쟁사 비교는 필수</b> — <b>3등은 좋아도 안 갈 수 있고, 1등은 더 잘 간다</b></li>
       <li>돈·관심·수급이 1등으로 쏠린다 → 이것이 '1등의 법칙'</li>
       <li><b>2026 예</b>: AI 가속기의 엔비디아, HBM의 SK하이닉스 — 2등이 따라와도 1등 프리미엄은 유지</li>
       <li>매수 전 질문: "이건 이 판의 1등인가, 2·3등인가?"</li></ul>`},
      {c:"amber", chip:"1등 실전", t:"주도섹터·주도주 — 돈은 1등 섹터의 대장에 모인다",
       body:`<div class="lead">돈은 평등하게 흐르지 않는다. 먼저 <b>1등 섹터(주도섹터)</b>로 모이고, 그 안의 <b>대장주(주도주)</b>가 가장 크게 간다.</div>
       <ul><li>이것이 '1등의 법칙 + 멱법칙'의 <b>실전 형태</b></li>
       <li>찾는 순서: <b>매크로(큰 물결) → 주도섹터(돈 모이는 산업) → 주도주(그 섹터의 대장)</b></li>
       <li>주도섹터 판별: 거래대금·상승률·뉴스 빈도 <b>1위 산업</b></li>
       <li><b>후발주·2·3등 추격 금지</b> — 대장이 가장 안전하고 가장 멀리 간다</li>
       <li><b>2026 예</b>: AI 반도체가 주도섹터, 그 안의 엔비디아·SK하이닉스가 주도주 (5주차에서 로테이션·밸류체인으로 심화)</li></ul>`},
      {c:"gold", chip:"본질", t:"자본주의 경매의 원리 — 사용자가 매긴 값이 곧 가격",
       body:`<div class="lead">시장은 거대한 경매장. <b>사용자가 가치를 측정하는 순간, 그게 곧 가격</b>이다.</div>
       <ul><li>경매는 '평균'이 아니라 <b>가장 간절한 사람</b>이 값을 정한다</li>
       <li>그 가격 = <b>본질가치 + 프리미엄</b>. 프리미엄의 정체가 바로 '희소성'(다음 카드)</li>
       <li><b>2026 예</b>: 메모리 품귀로 PS5 가격 최대 $150 인상, PC 출하 -11% 전망 — 사겠다는 힘이 값을 끌어올린다</li>
       <li>식었을 때(공포) 사서, 끓을 때(탐욕) 판다</li></ul>`},
      {c:"sky", chip:"기회", t:"시간의 왜곡 — 공포가 좋은 주식을 과거 가격으로 되돌린다",
       body:`<div class="lead">상대성 이론: 중력이 강하면 시간이 일그러진다. <b>시장에선 '공포'가 그 중력</b>이다.</div>

       <li>단, <b>'일시적 왜곡(공포)' vs '구조적 붕괴(진짜 쇠퇴)'</b>를 구분 — 눌린 용수철 vs 떨어지는 칼날</li>
       <li><b>사례</b>: 2020 코로나 패닉(우량주 급락 후 V자 반등), 2022 금리쇼크로 반토막 난 성장주 → 이후 AI주 폭등</li></ul>`},
      {c:"coral", chip:"제1원리", t:"희소성 — '보이지 않는 손'의 유일한 예외",
       body:`<div class="lead">아담 스미스: "가격은 시장이 정한다(보이지 않는 손)." <b>그 유일한 예외가 희소성</b>이다.</div>
       <ul><li>흔하면 싸고 귀하면 비싸다 — 모든 <b>프리미엄의 원천</b></li>
       <li>희소성이 생기면 가격을 '시장'이 아니라 <b>'파는 자(기업)'</b>가 정하기 시작한다</li>
       <li>핵심 질문: 이 회사가 파는 건 얼마나 <b>대체 불가능</b>한가?</li>
       <li><b>2026 예</b>: EUV 노광장비(ASML), 최첨단 HBM, 고급 GPU — 돈이 있어도 못 산다</li>
       <li>희소성 = 경매 프리미엄을 '구조화'한 것. 쇼티지와 만나면 폭발한다.</li></ul>`},
      {c:"amber", chip:"촉매", t:"쇼티지 현상 — 품절이 '생존'과 만나면 폭등",
       body:`<div class="lead">쇼티지 = 한마디로 <b>품절·부족</b>. 그게 생존과 연결되면 가격이 폭등한다.</div>
       <ul><li>수요는 그대로인데 공급이 막힘 → 가격은 <b>비선형</b>으로 튄다</li>
       <li>핵심은 "없으면 못 산다"가 아니라 <b>"없으면 안 돌아간다"</b>(생존 필수)</li>
       <li><b>2026 예</b>: AI發 메모리 슈퍼사이클 — "유례없는 공급부족", DRAM 수요 +30%</li>

      {c:"sky", chip:"구조", t:"병목 현상 — 사슬에서 가장 좁은 곳이 다 가진다",
       body:`<div class="lead">병목 = <b>수요·공급의 불균형</b>. 사려는 사람은 많은데 파는 곳이 그곳뿐이다.</div>
       <ul><li>생산 사슬 전체의 이익이 <b>가장 좁은 길목</b>으로 빨려 들어간다</li>
       <li>그 제품이 <b>생존에 필수</b>일 때 가격 폭등 → 희소성·가격결정과 한 몸</li>
       <li><b>2026 예</b>: AI 데이터센터의 이익이 GPU·HBM·HBM 본딩 장비(한미반도체)로 집중</li>

      {c:"gold", chip:"핵심", t:"가격결정권 — 권력이 시장에서 '기업'으로 넘어간다",

       <li><b>사람의 생존·기업의 생존</b>에 가까울수록 가격결정권이 강해진다</li>
       <li><b>2026 대표 예: 엔비디아 · SK하이닉스 · 한미반도체</b> — AI를 돌리려면 반드시 거쳐야 한다</li>
       <li>TSMC도 첨단공정 가격 3~10% 인상(2029까지) — 못 올리는 회사는 원가에 마진이 녹는다</li></ul>`},
      {c:"sage", chip:"해자", t:"진입 장벽 — 경쟁을 원천 차단하는 핵심 해자",

       <ul><li><b>병목</b> — 초고압 변압기 납기 3~5년, 가스터빈 빅3 수주잔고 포화. 공급자 우위가 굳어진 시장</li></ul>
       <div class="box-dark">데이터센터 전력소비 <b>447→565TWh(+26%, '25→'26, 가트너)</b>. 수요가 아니라 '공급 제약'이 투자 포인트.</div>`},
      {c:"lav", chip:"⑤ 수익화의 시험대", t:"AI 소프트웨어·서비스 — 마진 레버리지는 큰데, 증명이 과제",
       body:`<div class="lead">AI를 실제 매출로 바꾸는 응용 계층. 국내는 플랫폼(검색·메신저)·SI·게임이 주축. 인프라 대비 CAPEX 부담이 적어 마진 레버리지가 크지만 수익화 증명이 과제.</div>
       <ul><li><b>병목</b> — 수익화 시점. 'AI 기능'이 아닌 'AI 매출'을 보여주는 기업이 극소수</li></ul>
       <div class="box-dark">2026년 키워드는 <b>AI 에이전트</b>. 트래픽 보유 플랫폼(네이버 AI탭 300만 MAU)이 유리한 구도.</div>`},
      {c:"amber", chip:"⑥ 피지컬 AI 원년", t:"로봇·온디바이스 AI — 부품이 완성체보다 먼저 수혜",
       body:`<div class="lead">AI가 물리적 몸을 얻는 단계. 2026년은 휴머노이드 초기 양산기로, 완성체보다 액추에이터·감속기 등 부품 병목 기업이 먼저 수혜.</div>
       <ul><li><b>병목</b> — 부품 공급 병목과 양산 수율. 완성체는 아직 매출보다 기대감이 앞서는 구간</li></ul>
       <div class="box-red">테슬라 옵티머스 V3, 현대차 RMAC 등 <b>'실제 공장 투입' 이벤트</b>가 주가의 분수령 — 실적 없는 기대감 구간임을 명확히 인지.</div>`},
      {c:"gold", chip:"포스 그래프", t:"AI 섹터 관계망 — 누가 누구에게 발주하는가", wide:true,
       graph:{kind:"aisector", caption:"AI 모델·플랫폼의 CAPEX가 반도체·인프라·SW·로봇으로 갈라져 흘러간다. 대표 종목을 함께 표시했다.",
         legend:[["gold","AI 모델·플랫폼"],["sky","반도체"],["coral","소부장"],["sage","인프라"],["lav","SW·로봇"],["sub","대표 종목"]]}},
      {c:"sky", chip:"진화", t:"연산 패러다임 — CPU에서 메모리 중심으로",
       body:`<ul><li><b>~2022</b> CPU·범용 연산 — 직렬 처리, AI 학습엔 비효율</li>
       <li><b>2022~24</b> GPU·병렬 가속 — 엔비디아 독점, 전력·비용 부담 폭증</li>
       <li><b>2025~26</b> ASIC·NPU·전용 가속 — 빅테크 자체 칩으로 GPU 의존 탈피</li>
       <li><b>2026~</b> CXL·PIM·메모리 중심 — '메모리 벽'을 정면 돌파</li></ul>
       <div class="box-dark">진화의 방향은 하나: <b>범용에서 전용으로, 연산에서 메모리로.</b></div>`},
      {c:"lav", chip:"4대 아키텍처", t:"ASIC · NPU · CXL · PIM — 병목을 넘는 4가지 방법",
       body:`<ul><li><b>ASIC</b> — 워크로드 전용 커스텀 칩. 구글 TPU·아마존 Trainium이 대표, '엔비디아 vs 커스텀 실리콘'이 최대 전선</li>
       <li><b>NPU</b> — 온디바이스 AI 추론 전용 신경망 처리장치</li>
       <li><b>CXL</b> — 서버 메모리를 칩 경계 너머로 확장·공유</li>
       <li><b>PIM</b> — 메모리 안에서 직접 연산(HBM-PIM·AiM), 데이터 이동 자체를 없앰</li></ul>`},
      {c:"sage", chip:"밸류체인 심화", t:"설계 → 전공정 → 후공정 — 병목의 무게중심이 이동 중",
       body:`<ul><li><b>설계</b> — 팹리스·IP·EDA (엔비디아·ARM·시높시스)</li>
       <li><b>전공정</b> — 노광(EUV)·식각증착·세정CMP·계측검사 (ASML·Lam·KLA)</li>
       <li><b>후공정</b> — 웨이퍼테스트·<b>첨단 패키징</b>·기판·최종테스트</li></ul>
       <div class="box-red">AI 시대 병목은 미세화(전공정)에서 <b>첨단 패키징(후공정)</b>으로 이동 중 — CoWoS·HBM 적층이 최대 병목.</div>`},

       <li>병목 기업의 공통점 — 공급자 우위, 납기 수년, 가격 결정력, 이익률 급등(전력기기 3.8%→14.4%)</li></ul>
       <div class="term-note"><span class="tn-label">💡 용어 해설</span>
       <b>HBM</b>(고대역폭 메모리) — AI 칩 바로 옆에 붙어 데이터를 초고속으로 넘겨주는 특수 메모리. <b>CoWoS</b> — TSMC의 첨단 패키징 기술로, 여러 칩을 하나로 쌓아 붙이는 공정. 둘 다 "만들고 싶어도 아무나 못 만드는" 병목이다.</div>

       <ul><li><b>장비</b>는 일회성 수주(세대교체 사이 공백)</li>
       <li><b>소재·기판·소켓</b>은 반복 매출 — 섹터가 같아도 실적 리듬이 정반대임을 모르면 낭패</li></ul>
       <div class="term-note"><span class="tn-label">💡 용어 해설</span>
       <b>일회성 수주</b> — 장비 한 대를 팔면 다음 세대가 나올 때까지 추가 매출이 없는 구조. <b>수주잔고</b> — 아직 납품은 안 했지만 이미 계약이 확정된 미래 매출.</div>
       <div class="point-box"><span class="point-label">📌 관전 Point</span>

  cards.forEach(c=>{if(c.wide){flush();pages.push([c]);}else{buf.push(c);if(buf.length===2)flush();}});flush();return pages;}
function legColor(k){return ({gold:"#D4A853",amber:"#E8943A",coral:"#E87461",sky:"#5B9BD5",sage:"#7BA68C",lav:"#9B8EC4",sub:"#C9A66B",ink:"#1A1612"})[k]||k;}
function cardHTML(c){
  const [main,sub]=splitTitle(c.t);const subHTML=sub?`<div class="csub">${sub}</div>`:'';
  if(c.graph){
    return `<div class="pcard" data-c="${c.c}"><span class="chip">${c.chip}</span><h3>${main}</h3>${subHTML}
      <div class="graphwrap"><div class="graphbox" data-graph="${c.graph.kind}"></div>
      <div class="legend">${(c.graph.legend||[]).map(l=>`<span><i style="background:${legColor(l[0])}"></i>${l[1]}</span>`).join('')}</div>
      <div class="body" style="margin-top:10px">${c.graph.caption||''}</div></div></div>`;
  }
  return `<div class="pcard" data-c="${c.c}"><span class="chip">${c.chip}</span><h3>${main}</h3>${subHTML}
    <div class="body">${c.body||''}</div></div>`;
}
function renderHome(){
  tocEl.innerHTML=COURSE.map((w,i)=>{
    const n=buildPages(w.cards).length, ac=ACCENT[i%ACCENT.length];
    return `<div class="toc-card" data-w="${w.week}" style="--accent:${ac}">
      <div class="num">${String(w.week).padStart(2,'0')}</div>
      <div class="wk">Week ${String(w.week).padStart(2,'0')}</div>
      <h3>${w.title.split('—')[0].trim()}</h3>
      <p>${w.sub}</p>
      <div class="meta"><span>📑 ${w.cards.length} 카드</span><span>🗂 ${n} 페이지</span><span class="go">시작 →</span></div></div>`;
  }).join('');
  tocEl.querySelectorAll('.toc-card').forEach(el=>el.addEventListener('click',()=>openWeek(+el.dataset.w)));
  if(window.gsap&&!reduceMo){
    gsap.from('.hero-el',{y:26,opacity:0,duration:.7,stagger:.09,ease:'power3.out',clearProps:'all'});
    gsap.from('.toc-card',{y:30,opacity:0,duration:.55,stagger:.05,ease:'power3.out',delay:.15,clearProps:'all'});
  }
}
function openWeek(n){
  wk=n;page=0;document.body.classList.add('deckmode');
  const w=COURSE[n-1],ac=ACCENT[(n-1)%ACCENT.length];pagesCache=buildPages(w.cards);
  document.documentElement.style.setProperty('--accent',ac);
  document.getElementById('deck').style.setProperty('--accent',ac);
  wkPill.innerHTML=`<span class="b">${String(n).padStart(2,'0')}</span> ${w.title.split('—')[0].trim()}`;
  ptabsEl.innerHTML=pagesCache.map((_,i)=>`<button class="ptab" data-p="${i}">${i+1}</button>`).join('');
  ptabsEl.querySelectorAll('.ptab').forEach(b=>b.addEventListener('click',()=>{page=+b.dataset.p;renderPage();}));
  renderPage();
}
function goHome(){clearGraphs();document.body.classList.remove('deckmode');}
function renderPage(){
  clearGraphs();
  const cards=pagesCache[page]||[];
  pageEl.className='page'+(cards.length===1&&cards[0].wide?' wide':'');
  pageEl.innerHTML=cards.map(cardHTML).join('');
  ptabsEl.querySelectorAll('.ptab').forEach((b,i)=>b.classList.toggle('active',i===page));
  document.getElementById('prevBtn').disabled=(page===0);
  document.getElementById('nextBtn').disabled=(page>=pagesCache.length-1);
  progressEl.style.width=((page+1)/pagesCache.length*100)+'%';
  if(window.gsap&&!reduceMo) gsap.from('#page .pcard',{y:26,opacity:0,duration:.5,stagger:.09,ease:'power3.out',clearProps:'all'});
  pageEl.querySelectorAll('.graphbox').forEach(box=>requestAnimationFrame(()=>renderGraph(box,GRAPHS[box.dataset.graph])));
}
function step(d){const np=page+d;if(np>=0&&np<pagesCache.length){page=np;renderPage();}}
document.getElementById('homeBtn').addEventListener('click',goHome);
document.getElementById('prevBtn').addEventListener('click',()=>step(-1));
document.getElementById('nextBtn').addEventListener('click',()=>step(1));
document.addEventListener('keydown',e=>{if(!document.body.classList.contains('deckmode'))return;
  if(e.key==='ArrowRight'||e.key==='PageDown')step(1); if(e.key==='ArrowLeft'||e.key==='PageUp')step(-1);});

/* ===================== 포스 그래프 (입체 노드 + 입자 흐름) ===================== */
let graphCleanups=[];
function clearGraphs(){graphCleanups.forEach(fn=>{try{fn();}catch(e){}});graphCleanups=[];}
function shade(hex,p){ // p>0 밝게 / p<0 어둡게
  const n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  const t=p<0?0:255,a=Math.abs(p);
  r=Math.round((t-r)*a+r);g=Math.round((t-g)*a+g);b=Math.round((t-b)*a+b);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function renderGraph(box,g){
  if(!g||!window.d3)return;
  box.innerHTML='';
  const W=box.clientWidth||900,H=box.clientHeight||460;
  const nodes=g.nodes.map(d=>Object.assign({},d));
  const links=g.links.map(l=>({source:l[0],target:l[1]}));
  nodes.forEach(d=>{const t=TIER[d.tier]||TIER[1];d._fs=d.fs||t.fs;d._h=d.h||t.h;d._w=Math.max(56,d.id.length*d._fs*0.62+30);d._base=GBASE[d.group]||"#D4A853";});
  const svg=d3.select(box).append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet');
  const defs=svg.append('defs');
  // 그룹별 그라데이션 + 글로우/섀도 필터
  Object.keys(GBASE).forEach(k=>{
    const base=GBASE[k],grad=defs.append('linearGradient').attr('id','g_'+k).attr('x1','0').attr('y1','0').attr('x2','0').attr('y2','1');
    grad.append('stop').attr('offset','0%').attr('stop-color',shade(base,.30));
    grad.append('stop').attr('offset','52%').attr('stop-color',base);
    grad.append('stop').attr('offset','100%').attr('stop-color',shade(base,-.16));
  });
  const sh=defs.append('filter').attr('id','soft').attr('x','-40%').attr('y','-40%').attr('width','180%').attr('height','180%');
  sh.append('feDropShadow').attr('dx',0).attr('dy',4).attr('stdDeviation',5).attr('flood-color','#1A1612').attr('flood-opacity',.18);
  const gl=defs.append('filter').attr('id','glow').attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  gl.append('feGaussianBlur').attr('stdDeviation',7).attr('result','b');
  const fm=gl.append('feMerge');fm.append('feMergeNode').attr('in','b');fm.append('feMergeNode').attr('in','SourceGraphic');

  const isBig=d=>d.tier===0;
  const hasGrid=nodes.some(d=>d.gx!=null);
  const padX=Math.min(70,W*0.08), padY=Math.max(34,H*0.1);
  const gxTo=v=>padX+v*(W-2*padX), gyTo=v=>padY+v*(H-2*padY);
  const sim=d3.forceSimulation(nodes)
    .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>(isBig(d.source)||isBig(d.target))?150:115).strength(hasGrid?.25:.55))
    .force('charge',d3.forceManyBody().strength(hasGrid?-260:-720))
    .force('center',d3.forceCenter(W/2,H/2))
    .force('collide',d3.forceCollide().radius(d=>d._w/2+16))
    .force('gx',d3.forceX(d=>d.gx!=null?gxTo(d.gx):W/2).strength(d=>d.gx!=null?0.92:0))
    .force('gy',d3.forceY(d=>d.gy!=null?gyTo(d.gy):H/2).strength(d=>d.gy!=null?0.92:0));
  // 화면 밖 이탈 방지 — 모든 노드가 항상 프레임 안에 보이도록 매 tick 클램프
  sim.on('tick',()=>{nodes.forEach(d=>{
    const hw=d._w/2+6,hh=d._h/2+6;
    if(d.x<hw)d.x=hw; else if(d.x>W-hw)d.x=W-hw;
    if(d.y<hh)d.y=hh; else if(d.y>H-hh)d.y=H-hh;
  });});

  const linkSel=svg.append('g').attr('stroke','#E0CDAD').attr('stroke-width',2.2).attr('stroke-linecap','round')
    .selectAll('line').data(links).join('line').attr('opacity',.7);
  const flow=svg.append('g').selectAll('circle').data(links).join('circle')
    .attr('r',3.6).attr('fill',d=>'#E8943A').attr('opacity',reduceMo?0:.9).attr('filter','url(#glow)');
  links.forEach(l=>{l._t=Math.random();l._spd=0.0022+Math.random()*0.0018;});

  const node=svg.append('g').selectAll('g').data(nodes).join('g').attr('class','gnode').style('cursor','grab')
    .call(d3.drag()
      .on('start',(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}));
  const inner=node.append('g').attr('class','inr');
  inner.filter(d=>d.pulse).append('circle').attr('class','halo')
    .attr('r',d=>d._w/2+10).attr('fill',d=>d._base).attr('opacity',.16);
  inner.append('rect').attr('x',d=>-d._w/2).attr('y',d=>-d._h/2).attr('width',d=>d._w).attr('height',d=>d._h)
    .attr('rx',d=>d._h/2).attr('fill',d=>`url(#g_${d.group})`).attr('stroke','#fff').attr('stroke-width',2.4)
    .attr('filter',d=>d.glow?'url(#glow)':'url(#soft)');
  // 상단 광택
  inner.append('rect').attr('x',d=>-d._w/2+6).attr('y',d=>-d._h/2+3).attr('width',d=>d._w-12).attr('height',d=>d._h*0.42)
    .attr('rx',d=>d._h*0.21).attr('fill','#fff').attr('opacity',.22).attr('pointer-events','none');
  inner.append('text').attr('class','glabel').text(d=>d.id).attr('text-anchor','middle').attr('dy','.34em')
    .attr('font-size',d=>d._fs).attr('fill',d=>d.group==='bottle'?'#3a2606':'#fff').attr('pointer-events','none');

  // 호버 하이라이트
  const adj={};links.forEach(l=>{(adj[l.source.id||l.source]=adj[l.source.id||l.source]||new Set()).add(l.target.id||l.target);
    (adj[l.target.id||l.target]=adj[l.target.id||l.target]||new Set()).add(l.source.id||l.source);});
  node.on('mouseenter',(e,d)=>{
    node.style('opacity',o=>o.id===d.id||(adj[d.id]&&adj[d.id].has(o.id))?1:.16);
    linkSel.attr('opacity',l=>(l.source.id===d.id||l.target.id===d.id)?.95:.08)
      .attr('stroke',l=>(l.source.id===d.id||l.target.id===d.id)?'#D4A853':'#E0CDAD');
    flow.attr('opacity',l=>reduceMo?0:((l.source.id===d.id||l.target.id===d.id)?1:.12));
  }).on('mouseleave',()=>{node.style('opacity',1);linkSel.attr('opacity',.7).attr('stroke','#E0CDAD');flow.attr('opacity',reduceMo?0:.9);});

  // 등장 모션 + 펄스
  if(window.gsap&&!reduceMo){
    gsap.from(inner.nodes(),{scale:.55,opacity:0,transformOrigin:'center',duration:.6,stagger:.035,ease:'back.out(1.5)'});
    inner.filter(d=>d.pulse).select('.halo').each(function(){gsap.to(this,{attr:{r:'+=14'},opacity:.05,duration:1.7,repeat:-1,yoyo:true,ease:'sine.inOut'});});
  }

  // 통합 렌더 루프 (sim 정착 후에도 입자 계속 흐름)
  let raf;
  function frame(){
    linkSel.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform',d=>`translate(${d.x||W/2},${d.y||H/2})`);
    if(!reduceMo) flow.attr('cx',d=>{d._t+=d._spd;if(d._t>1)d._t-=1;return d.source.x+(d.target.x-d.source.x)*d._t;})
                     .attr('cy',d=>d.source.y+(d.target.y-d.source.y)*d._t)
                     .attr('fill',d=>shade(d.source._base||'#E8943A',.05));
    raf=requestAnimationFrame(frame);
  }
  frame();
  graphCleanups.push(()=>{cancelAnimationFrame(raf);sim.stop();if(window.gsap)gsap.killTweensOf(inner.nodes());});
}
let rzT;window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{if(document.body.classList.contains('deckmode'))renderPage();sizeCanvas();},240);});

const canvas=document.getElementById('drawCanvas'),ctx=canvas.getContext('2d');
let currentTool='select',drawing=false,lastX=0,lastY=0;
const TOOLS={black:{color:'#1A1612',width:4,alpha:1,comp:'source-over'},red:{color:'#E5342B',width:4,alpha:1,comp:'source-over'},
  blue:{color:'#1E66E0',width:4,alpha:1,comp:'source-over'},mark:{color:'#FFE94D',width:28,alpha:.42,comp:'source-over'},
  eraser:{color:'#000',width:34,alpha:1,comp:'destination-out'}};
function sizeCanvas(){const dpr=window.devicePixelRatio||1,prev=canvas.width?canvas.toDataURL():null;
  canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
  if(prev){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,innerWidth,innerHeight);img.src=prev;}}
sizeCanvas();
function setTool(name){if(name==='clear'){ctx.clearRect(0,0,canvas.width,canvas.height);showHint('판서 지움');return;}
  currentTool=name;document.querySelectorAll('.tool').forEach(t=>t.classList.toggle('active',t.dataset.tool===name));
  canvas.style.pointerEvents=(name==='select')?'none':'auto';canvas.style.cursor=(name==='select')?'default':(name==='eraser')?'cell':'crosshair';
  showHint({select:'선택 모드',black:'검정 펜',red:'빨강 펜',blue:'파랑 펜',mark:'형광펜',eraser:'지우개'}[name]||'');}
document.querySelectorAll('.tool').forEach(b=>b.addEventListener('click',()=>setTool(b.dataset.tool)));
function pos(e){const r=canvas.getBoundingClientRect();return [e.clientX-r.left,e.clientY-r.top];}
canvas.addEventListener('pointerdown',e=>{if(currentTool==='select')return;drawing=true;[lastX,lastY]=pos(e);e.preventDefault();});
canvas.addEventListener('pointermove',e=>{if(!drawing)return;const[x,y]=pos(e),t=TOOLS[currentTool];if(!t)return;
  ctx.globalCompositeOperation=t.comp;ctx.globalAlpha=t.alpha;ctx.strokeStyle=t.color;ctx.lineWidth=t.width;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(lastX,lastY);ctx.lineTo(x,y);ctx.stroke();lastX=x;lastY=y;e.preventDefault();});
window.addEventListener('pointerup',()=>drawing=false);
const palette=document.getElementById('palette'),grip=document.getElementById('grip');let dg=false,ox=0,oy=0;
grip.addEventListener('pointerdown',e=>{dg=true;const r=palette.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;palette.style.right='auto';palette.style.bottom='auto';grip.setPointerCapture(e.pointerId);});
grip.addEventListener('pointermove',e=>{if(!dg)return;const r=palette.getBoundingClientRect();
  let x=Math.max(4,Math.min(innerWidth-r.width-4,e.clientX-ox)),y=Math.max(4,Math.min(innerHeight-r.height-4,e.clientY-oy));palette.style.left=x+'px';palette.style.top=y+'px';});
grip.addEventListener('pointerup',()=>dg=false);
const hintEl=document.getElementById('hint');let hintT;
function showHint(t){if(!t)return;hintEl.textContent=t;hintEl.classList.add('show');clearTimeout(hintT);hintT=setTimeout(()=>hintEl.classList.remove('show'),1400);}
document.addEventListener('keydown',e=>{const m={'1':'black','2':'red','3':'blue','4':'mark','0':'select'};if(m[e.key])setTool(m[e.key]);if(e.key==='Escape')setTool('select');});

/* ===================== 실시간 게시판 (3초 폴링, 수정·삭제, 관리자 모드) ===================== */
const BOARD_API='/api/posts';
const BOARD_POLL_MS=3000;
let boardPosts=[], boardTimer=null, boardOffline=false, boardLastSubmit=0, boardEditingId=null;

function escHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function timeAgo(ts){const s=Math.max(0,Math.floor((Date.now()-ts)/1000));
  if(s<5)return '방금 전'; if(s<60)return s+'초 전'; const m=Math.floor(s/60); if(m<60)return m+'분 전';
  const h=Math.floor(m/60); if(h<24)return h+'시간 전'; return new Date(ts).toLocaleDateString('ko-KR',{month:'numeric',day:'numeric'});}

// 이 브라우저를 식별하는 익명 ID — 본인 글 판별용(서버는 이 값 자체를 다른 사람에게 노출하지 않음)
function getClientId(){
  let id=localStorage.getItem('board_client_id');
  if(!id){ id=(crypto.randomUUID?crypto.randomUUID():'c_'+Date.now()+'_'+Math.random().toString(36).slice(2)); localStorage.setItem('board_client_id', id); }
  return id;
}
const boardClientId = getClientId();

// 관리자 모드 — 이 탭이 닫히면 자동 해제(sessionStorage), 비밀번호는 서버에만 저장(env.ADMIN_KEY)
function getAdminKey(){return sessionStorage.getItem('board_admin_key')||'';}
function setAdminKey(k){ if(k) sessionStorage.setItem('board_admin_key',k); else sessionStorage.removeItem('board_admin_key'); }
function isAdminMode(){return !!getAdminKey();}

function boardLocalKey(){return 'board_offline_posts_v1';}
function boardLoadLocal(){try{return JSON.parse(localStorage.getItem(boardLocalKey())||'[]');}catch(e){return [];}}
function boardSaveLocal(list){try{localStorage.setItem(boardLocalKey(), JSON.stringify(list.slice(-200)));}catch(e){}}

function setBoardStatus(off){
  boardOffline=off;
  const el=document.getElementById('boardStatus');
  el.classList.toggle('off',off);
  el.innerHTML='<span class="dotlive"></span>'+(off?'오프라인(이 기기 전용)':'연결됨');
  document.getElementById('boardHint').textContent = off
    ? '⚠ 서버 미연결 — 이 기기 브라우저에만 저장됩니다 (관리자: functions/api/posts.js + KV 바인딩 필요)'
    : '최대 300자 · 등록하면 약 3초 내 모든 참여자 화면에 표시됩니다';
}

function renderBoardList(){
  const listEl=document.getElementById('boardList');
  if(!boardPosts.length){listEl.innerHTML='<div class="board-empty">아직 글이 없습니다 · 첫 글을 남겨보세요</div>';return;}
  const atBottom = listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight < 40;
  const admin=isAdminMode();
  listEl.innerHTML = boardPosts.map(p=>{
    const canEdit = p.mine && !boardOffline || (boardOffline);
    const canDelete = p.mine || admin || boardOffline;
    const editedTag = p.edited ? '<span class="bi-edited">(수정됨)</span>' : '';
    if(boardEditingId===p.id){
      return `<div class="board-item">
        <div class="bi-top"><span class="bi-name">${escHtml(p.name||'익명')}</span><span class="bi-time">${timeAgo(p.ts)}</span></div>
        <div class="bi-edit-row">
          <textarea id="editArea_${p.id}" maxlength="300">${escHtml(p.text)}</textarea>
          <button class="save" onclick="boardSaveEdit('${p.id}')">저장</button>
          <button class="cancel" onclick="boardCancelEdit()">취소</button>
        </div></div>`;
    }
    const actions=[];
    if(canEdit) actions.push(`<button class="bi-act" onclick="boardStartEdit('${p.id}')">✏️ 수정</button>`);
    if(canDelete) actions.push(`<button class="bi-act del" onclick="boardDelete('${p.id}')">🗑 삭제</button>`);
    return `<div class="board-item">
      <div class="bi-top"><span class="bi-name">${escHtml(p.name||'익명')}${editedTag}</span><span class="bi-time">${timeAgo(p.ts)}</span></div>
      <div class="bi-text">${escHtml(p.text)}</div>
      ${actions.length?`<div class="bi-actions">${actions.join('')}</div>`:''}</div>`;
  }).join('');
  if(atBottom) listEl.scrollTop = listEl.scrollHeight;
}

async function boardFetch(){
  try{
    const res=await fetch(BOARD_API+'?clientId='+encodeURIComponent(boardClientId),{cache:'no-store'});
    if(!res.ok) throw new Error('bad status');
    const data=await res.json();
    boardPosts=(data.posts||[]).sort((a,b)=>a.ts-b.ts);
    if(boardOffline) setBoardStatus(false);
    renderBoardList();
  }catch(e){
    if(!boardOffline){boardPosts=boardLoadLocal().map(p=>Object.assign({mine:true},p));setBoardStatus(true);renderBoardList();}
  }
}
async function boardSubmit(){
  const nameEl=document.getElementById('boardName'), textEl=document.getElementById('boardText');
  const name=nameEl.value.trim().slice(0,20), text=textEl.value.trim().slice(0,300);
  if(!text) return;
  if(Date.now()-boardLastSubmit<2500) return;
  boardLastSubmit=Date.now();
  const btn=document.getElementById('boardSubmit'); btn.disabled=true;
  const post={id:'local_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name:name||'익명', text, ts:Date.now(), mine:true};
  if(boardOffline){
    boardPosts.push(post); boardSaveLocal(boardPosts); renderBoardList(); textEl.value=''; btn.disabled=false; return;
  }
  try{
    const res=await fetch(BOARD_API,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:post.name,text:post.text,clientId:boardClientId})});
    if(!res.ok) throw new Error('post fail');
    textEl.value=''; await boardFetch();
  }catch(e){
    boardPosts=boardLoadLocal(); boardPosts.push(post); boardSaveLocal(boardPosts); setBoardStatus(true); renderBoardList(); textEl.value='';
  }
  btn.disabled=false;
}
function boardStartEdit(id){ boardEditingId=id; renderBoardList();
  setTimeout(()=>{const ta=document.getElementById('editArea_'+id); if(ta){ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length);}},0);
}
function boardCancelEdit(){ boardEditingId=null; renderBoardList(); }
async function boardSaveEdit(id){
  const ta=document.getElementById('editArea_'+id); if(!ta) return;
  const text=ta.value.trim().slice(0,300); if(!text) return;
  if(boardOffline){
    const list=boardLoadLocal(); const idx=list.findIndex(p=>p.id===id);
    if(idx>-1){ list[idx].text=text; list[idx].edited=true; boardSaveLocal(list); }
    boardEditingId=null; boardPosts=list.map(p=>Object.assign({mine:true},p)); renderBoardList(); return;
  }
  try{
    const res=await fetch(BOARD_API,{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id, clientId:boardClientId, text})});
    if(!res.ok){ const e=await res.json().catch(()=>({})); alert('수정 실패: '+(e.error||res.status)); return; }
    boardEditingId=null; await boardFetch();
  }catch(e){ alert('수정 중 오류가 발생했습니다'); }
}
async function boardDelete(id){
  if(!confirm('이 글을 삭제할까요?')) return;
  if(boardOffline){
    const list=boardLoadLocal().filter(p=>p.id!==id); boardSaveLocal(list);
    boardPosts=list.map(p=>Object.assign({mine:true},p)); renderBoardList(); return;
  }
  try{
    const res=await fetch(BOARD_API,{method:'DELETE',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id, clientId:boardClientId, adminKey:getAdminKey()})});
    if(!res.ok){ const e=await res.json().catch(()=>({})); alert('삭제 실패: '+(e.error||res.status)); return; }
    await boardFetch();
  }catch(e){ alert('삭제 중 오류가 발생했습니다'); }
}
window.boardStartEdit=boardStartEdit; window.boardCancelEdit=boardCancelEdit;
function fwTab(key,btn){
  const card=btn.closest('.pcard'); if(!card) return;
  card.querySelectorAll('.fw-panel').forEach(p=>p.classList.toggle('active',p.dataset.tab===key));
  card.querySelectorAll('.fw-tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
}
window.fwTab=fwTab;
window.boardSaveEdit=boardSaveEdit; window.boardDelete=boardDelete;

function renderAdminZone(){
  const zone=document.getElementById('boardAdminZone');
  if(isAdminMode()){
    zone.innerHTML='<button class="admin-toggle on" id="adminToggle">🔓 관리자 종료</button>';
  }else{
    zone.innerHTML='<button class="admin-toggle" id="adminToggle">🔑 관리자</button>';
  }
  document.getElementById('adminToggle').addEventListener('click',()=>{
    if(isAdminMode()){ setAdminKey(''); renderAdminZone(); renderBoardList(); return; }
    const zoneEl=document.getElementById('boardAdminZone');
    zoneEl.innerHTML=`<span class="admin-box">
      <input type="password" id="adminPass" placeholder="관리자 암호" />
      <button id="adminOk">확인</button></span>`;
    document.getElementById('adminPass').focus();
    const submit=()=>{ const v=document.getElementById('adminPass').value; setAdminKey(v); renderAdminZone(); renderBoardList(); };
    document.getElementById('adminOk').addEventListener('click',submit);
    document.getElementById('adminPass').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  });
}

function openBoard(){
  document.body.classList.add('boardmode');
  renderAdminZone();
  boardFetch();
  if(boardTimer) clearInterval(boardTimer);
  boardTimer=setInterval(boardFetch, BOARD_POLL_MS);
}
function closeBoard(){
  document.body.classList.remove('boardmode');
  boardEditingId=null;
  if(boardTimer){clearInterval(boardTimer);boardTimer=null;}
}
document.getElementById('boardFab').addEventListener('click',openBoard);
document.getElementById('boardClose').addEventListener('click',closeBoard);
document.getElementById('boardSubmit').addEventListener('click',boardSubmit);
document.getElementById('boardText').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();boardSubmit();}
});

renderHome();

</script>
